<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=1.0, viewport-fit=cover">
    <title>Ant Data AI Stats Tool</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html,body { width:100%; min-height:100vh; background:#121212; color:#eee; padding:6px; }
        .container { max-width:700px; margin:0 auto; overflow-x:hidden; }
        .tool-box { background:#1a1a1a; padding:12px 10px; border-radius:16px; border:1px solid #2a2a2a; }
        h1 { text-align:center; font-size:20px; margin-bottom:12px; color:#fff; }
        .panel { margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid #222; }
        .panel:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
        .panel-title { font-size:15px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .panel-title-left { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .sub-group { background:#1e1e1e; border-radius:12px; padding:10px; margin-bottom:12px; border-left:3px solid #007bff; }
        .sub-group:last-child { margin-bottom:0; }
        .sub-title { font-size:15px; font-weight:bold; margin-bottom:8px; color:#fff; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
        .ant-clickable { cursor:pointer; display:inline-block; transition:transform 0.1s ease; user-select:none; }
        .ant-clickable:active { transform:scale(0.96); }
        #inputAreaWrapper { display:none; transition:opacity 0.2s; }
        textarea { width:100%; height:70px; padding:8px; border:none; border-radius:8px; font-size:14px; background:#222; color:#eee; outline:none; resize:vertical; max-height:120px; }
        .input-info { font-size:12px; color:#888; margin-top:4px; }
        .btn-group { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
        button, .btn-link { flex:1; min-width:60px; padding:10px 4px; border:none; border-radius:8px; background:#252525; color:#eee; font-size:13px; cursor:pointer; transition:all 0.2s; text-align:center; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; min-height:44px; line-height:1.2; }
        button:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-link { background:#252525; color:#eee; }
        .btn-link:hover { background:#3a3a3a; }
        button:active, .btn-link:active { opacity:0.7; transform:scale(0.96); }
        button.primary { background:#007bff; color:#fff; }
        .result-section { margin-top:8px; padding:8px; border-radius:12px; background:#222; }
        .result-title { font-size:15px; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap; }
        .stats-two-columns { display:flex; gap:16px; flex-wrap:wrap; }
        .stats-column { flex:1; min-width:0; }
        .stats-column .stat-header { font-size:13px; font-weight:bold; color:#007bff; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid #333; }
        .thank-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:6px 0; border-bottom:1px solid #333; gap:12px; flex-wrap:wrap; }
        .marquee-container { flex:1; overflow:hidden; text-align:center; }
        .marquee { white-space:nowrap; display:inline-block; animation:marquee 15s linear infinite; padding-left:100%; color:#f97316; }
        @keyframes marquee { 0% { transform:translateX(0); } 100% { transform:translateX(-100%); } }
        .period-text { font-size:14px; font-weight:bold; color:#007bff; white-space:nowrap; background:#252525; padding:4px 12px; border-radius:40px; }
        .base-row { display:flex; gap:12px; font-size:13px; flex-wrap:wrap; align-items:center; }
        .group-item { padding:8px 10px; margin:4px 0; background:#252525; font-size:13px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; width:100%; word-break:break-word; overflow-wrap:break-word; border-left:2px solid #007bff; flex-wrap:wrap; gap:8px; }
        .copy-btn { padding:4px 8px; background:#333; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; }
        .copy-tip { color:#6cce6c; font-size:12px; margin-left:6px; }
        .compare-row { background:#252525; border-left:2px solid #007bff; }
        .final-row { background:#252525; border-left:2px solid #007bff; }
        .final-row .title-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .datetime { font-size:12px; color:#aaa; }
        .rule-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; background:#252525; padding:6px 10px; border-radius:10px; position:relative; flex-wrap:wrap; }
        .rule-row .rule-index { width:36px; text-align:center; font-weight:bold; color:#007bff; font-size:14px; }
        .rule-row input { flex:1; background:#1e1e1e; border:1px solid #3a3a3a; border-radius:8px; padding:10px 6px; color:#eee; font-size:14px; text-align:center; min-width:80px; }
        .custom-rule-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; background:#252525; padding:6px 10px; border-radius:10px; position:relative; flex-wrap:wrap; }
        .custom-rule-row .rule-index { width:36px; text-align:center; font-weight:bold; color:#007bff; font-size:14px; }
        .custom-rule-row input { flex:1; background:#1e1e1e; border:1px solid #3a3a3a; border-radius:8px; padding:10px 6px; color:#eee; font-size:14px; text-align:center; min-width:80px; }
        .del-rule-btn { position:absolute; right:0px; top:-8px; background:transparent; border:none; color:#aaa; font-size:12px; cursor:pointer; padding:0; line-height:1; font-weight:bold; z-index:5; }
        .del-rule-btn:hover { color:#ff4444; }
        .rule-inputs-container { margin-top:12px; display:none; }
        .switch-control { display:flex; align-items:center; gap:6px; font-size:12px; color:#888; }
        .switch-control input { width:36px; height:20px; appearance:none; background:#333; border-radius:20px; position:relative; cursor:pointer; }
        .switch-control input:checked { background:#007bff; }
        .switch-control input::after { content:''; position:absolute; width:16px; height:16px; background:#fff; border-radius:50%; top:2px; left:2px; transition:0.2s; }
        .switch-control input:checked::after { left:18px; }
        .note-textarea { width:100%; height:100px; margin-top:8px; display:none; background:#252525; border:none; border-radius:8px; color:#eee; padding:8px; resize:vertical; max-height:150px; }
        .query-zodiac-input { margin-top:8px; max-width:70%; }
        .query-zodiac-input input { width:100%; padding:8px 6px; border-radius:8px; background:#222; color:#eee; font-size:14px; border:none; }
        .query-zodiac-result { margin-top:8px; padding:8px; background:#252525; border-radius:8px; font-size:13px; word-break:break-word; }
        .total-zodiac-stat { margin-top:8px; padding:8px; background:#252525; border-radius:8px; font-size:13px; }
        .total-zodiac-list { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; justify-items:center; margin-top:6px; }
        .total-zodiac-list .zodiac-item { display:inline-block; margin:2px; padding:4px 6px; background:#252525; border-radius:6px; font-size:12px; color:#eee; cursor:pointer; white-space:nowrap; }
        .hit-rate-display { margin:10px 0; padding:8px; background:#252525; border-radius:8px; text-align:center; font-size:14px; }
        .footer { text-align:center; margin-top:16px; font-size:11px; color:#666; }
        .rule-import-box { margin:10px 0; display:flex; gap:8px; align-items:stretch; }
        .rule-import-input { flex:1; min-height:132px; height:auto; padding:8px; border-radius:8px; background:#222; color:#eee; font-size:14px; border:none; resize:vertical; max-height:150px; white-space:pre-wrap; }
        .rule-btn-col { display:flex; flex-direction:column; gap:8px; justify-content:space-between; }
        .rule-btn-col button { flex:1; white-space:nowrap; min-height:0; }
        .link-btn { background:#007bff; color:#fff; padding:6px 10px; border-radius:8px; text-decoration:none; font-size:13px; display:flex; align-items:center; justify-content:center; flex:1; min-width:60px; }
        .rule-container { background:#0d0d0d; border-radius:14px; padding:12px; margin:12px 0; display:flex; flex-wrap:wrap; gap:8px; border:1px solid #2c2c2c; }
        .ab-line { margin:2px 0; padding:4px 10px; line-height:1.4; border-radius:20px; cursor:pointer; display:inline-block; font-size:12px; transition:all 0.2s; }
        .ab-line:hover { transform:scale(1.02); filter:brightness(1.1); background:#3a3a3a; }
        .rule-hot { background:#2a1a1a; color:#f97316; border-left:3px solid #f97316; }
        .rule-warm { background:#2a2a1a; color:#facc15; border-left:3px solid #facc15; }
        .rule-cold { background:#1a2a3a; color:#60a5fa; border-left:3px solid #60a5fa; }
        .ab-sequence { background:#0d0d0d; border-radius:14px; padding:12px; margin-top:10px; font-family:monospace; font-size:12px; max-height:260px; overflow-y:auto; border:1px solid #2c2c2c; }
        .period-input-row { display:flex; align-items:center; gap:12px; flex-wrap:nowrap; margin-bottom:12px; overflow-x:auto; white-space:nowrap; }
        .period-input-row label { font-size:14px; color:#aaa; font-weight:500; white-space:nowrap; }
        .period-input-row input { background:#222; border:none; border-radius:40px; padding:8px 12px; color:#eee; font-size:14px; width:70px; text-align:center; }
        .period-input-row select { background:#222; border:none; border-radius:40px; padding:8px 12px; color:#eee; font-size:14px; cursor:pointer; }
        .rule-stats { font-size:14px; font-weight:500; color:#007bff; background:#252525; padding:5px 12px; border-radius:40px; line-height:1.2; white-space:nowrap; flex-shrink:0; }
        .button-row-right { display:flex; justify-content:flex-end; align-items:center; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
        .btn-small { background:#252525; border:none; padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; color:#eee; transition:all 0.2s; min-width:60px; text-align:center; }
        .btn-small:hover { background:#3a3a3a; }
        .btn-small:active { opacity:0.7; transform:scale(0.96); }
        .info-row-right { display:flex; justify-content:flex-end; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
        .edit-rule-row { margin-top:12px; margin-bottom:12px; padding:10px; background:#1a1a1a; border-radius:12px; border:1px solid #2c2c2c; }
        .edit-label { font-size:12px; color:#888; margin-bottom:6px; }
        .edit-input { width:100%; background:#0d0d0d; border:1px solid #2c2c2c; border-radius:40px; padding:10px 12px; color:#e0e0e0; font-size:13px; font-family:monospace; }
        .reason { display:flex; align-items:center; justify-content:center; font-size:12px; color:#888; margin-top:8px; padding:4px 0; }
        @media (max-width:600px) {
            body { padding:4px; } .tool-box { padding:8px; } .sub-group { padding:8px; }
            .rule-row, .custom-rule-row { gap:6px; padding:4px 8px; }
            .rule-row input, .custom-rule-row input { padding:8px 4px; font-size:13px; min-width:70px; }
            .rule-row .rule-index, .custom-rule-row .rule-index { width:30px; font-size:13px; }
            button, .btn-link { padding:8px 2px; font-size:12px; min-height:40px; }
            .btn-small { padding:6px 8px; font-size:11px; min-width:50px; }
            .del-rule-btn { font-size:10px; right:0px; top:-6px; }
            .total-zodiac-list { grid-template-columns:repeat(4,1fr); gap:4px; }
            .total-zodiac-list .zodiac-item { white-space:normal; font-size:11px; padding:4px 4px; }
            .group-item { font-size:12px; padding:6px 8px; flex-direction:column; align-items:flex-start; }
            .group-item .copy-btn { align-self:flex-end; }
            .query-zodiac-input { max-width:100%; } .rule-import-input { min-height:120px; }
            .stats-two-columns { flex-direction:column; gap:8px; }
            .button-row-right { justify-content:flex-start; } .info-row-right { justify-content:flex-start; }
            .period-input-row { gap:8px; } .period-input-row input { width:60px; padding:6px 8px; }
            .period-input-row select { padding:6px 8px; } .rule-stats { padding:4px 10px; font-size:13px; }
            .result-title { font-size:15px; gap:4px; } .result-title .switch-control { font-size:12px; }
            .result-title .switch-control input { width:36px; height:20px; }
            .result-title .switch-control input::after { width:16px; height:16px; top:2px; left:2px; }
            .result-title .switch-control input:checked::after { left:18px; }
            .sub-title { flex-wrap:wrap; } .period-text { font-size:12px; }
            .marquee-container { text-align:center; } .datetime { font-size:11px; } .reason { font-size:11px; }
        }

        /* 授权卡片样式 */
        .auth-card {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding: 8px;
            background: #0d0d0d;
            border-radius: 12px;
        }
        .auth-card .device-code {
            font-family: monospace;
            background: #252525;
            padding: 0 12px;
            border-radius: 20px;
            color: #facc15;
            font-size: 11px;
            cursor: pointer;
            height: 36px;
            line-height: 36px;
            display: flex;
            align-items: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: none;
            width: auto;
        }
        .auth-card input {
            background: #252525;
            border: 1px solid #2c2c2c;
            border-radius: 8px;
            padding: 0 12px;
            color: #eee;
            font-size: 13px;
            width: 120px;
            height: 36px;
            line-height: 36px;
        }
        .auth-card button {
            background: #252525;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            height: 36px;
            line-height: 36px;
            flex: none;
            width: auto;
            min-width: 0;
            padding: 0 12px;
        }
        .auth-card button:active { transform: scale(0.96); opacity: 0.9; }
        .auth-card .auth-tip {
            color: #aaa;
            font-size: 11px;
            margin-left: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tool-box">
        <h1>Ant Data AI Stats Tool</h1>
        <div class="panel">
            <div class="panel-title"><div class="panel-title-left"><span></span></div></div>
            <div id="group1Content">
                <div class="sub-group" id="gaGbPanel">
                    <!-- 授权卡片 -->
                    <div class="auth-card" id="authCard">
                        <span class="device-code" id="authCardDeviceCode">加载中...</span>
                        <input type="password" id="authCardCode" placeholder="授权码" autocomplete="off">
                        <button id="authCardVerifyBtn">验证</button>
                        <span id="authCardTip" class="auth-tip"></span>
                    </div>
                    <div class="sub-title">
                        <span><span class="ant-clickable" id="antIcon">🐜</span> Data</span>
                        <span class="period-text" id="periodNumber"></span>
                    </div>
                    <div class="btn-group">
                        <button onclick="copyBothData()">📋 Copy</button>
                        <button onclick="clearBoth()">🗑 Clear</button>
                        <button onclick="importTxtToBoth()">📄 TXT</button>
                        <button id="autoSyncBtn">🔄 同步</button>
                    </div>
                    <div id="inputAreaWrapper">
                        <div class="input-box"><textarea id="numInput1" placeholder="G · A 盘口数据" oninput="autoCalc(1)"></textarea><div class="input-info" id="inputInfo1">已输入：0 个</div></div>
                        <div class="input-box"><textarea id="numInput2" placeholder="G · B 盘口数据" oninput="autoCalc(2)"></textarea><div class="input-info" id="inputInfo2">已输入：0 个</div></div>
                    </div>
                    <div class="thank-header">
                        <div class="marquee-container" id="marqueeContainer"><div class="marquee" id="marqueeText">蚂蚁数据-专注澳彩</div></div>
                        <label class="switch-control"><input type="checkbox" id="globalStatSwitch" onchange="toggleGlobalStat()"></label>
                    </div>
                    <div class="stats-two-columns" id="statsColumns">
                        <div class="stats-column"><div id="baseResult1"></div><div id="groupResult1"></div></div>
                        <div class="stats-column"><div id="baseResult2"></div><div id="groupResult2"></div></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title"><div class="panel-title-left"><span>🟥 默认规则</span></div><label class="switch-control"><input type="checkbox" id="rangeSwitch" onchange="toggleRangePanel()"></label></div>
            <div id="rangePanelWrap" style="display:none; margin-top:8px;">
                <div class="input-box"><textarea id="rangeData" placeholder="官方规则点击下方 同步  " oninput="onRangeDataChange()"></textarea></div>
                <div class="btn-group">
                    <button id="importRulesFromRangeBtn">📥 导入</button>
                    <button id="onlineCollectRangeBtn">🌐 同步</button>
                    <button id="openVipBtn">🌐 区间</button>
                    <button id="openPmBtn">🌐 采集</button>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title"><div class="panel-title-left"><span>🟩 笛卡尔积</span></div><label class="switch-control"><input type="checkbox" id="selectRangeSwitch" onchange="toggleSelectRangePanel()"></label></div>
            <div id="selectRangePanelWrap" style="display:none; margin-top:8px;">
                <div class="period-input-row">
                    <label>组数：</label>
                    <input type="tel" id="selectPeriodInput" value="0" inputmode="numeric">
                    <label>模式：</label>
                    <select id="coldModeSelect">
                        <option value="minmax">max > min</option>
                        <option value="diff2">B ≥ 2</option>
                    </select>
                    <span id="selectRuleGridCount" class="rule-stats">0格</span>
                </div>
                <div class="button-row-right">
                    <button id="refreshSelectRulesBtn" class="btn-small">🔄 刷新</button>
                    <button id="importSelectHotBtn" class="btn-small">🔥 导入热</button>
                    <button id="importSelectWarmBtn" class="btn-small">🌡️ 导入温</button>
                    <button id="importSelectColdBtn" class="btn-small">❄️ 导入冷</button>
                </div>
                <div id="selectRulesDetail" class="rule-container">加载中...</div>
                <div id="editRulePanel" class="edit-rule-row" style="display:none;">
                    <div class="edit-label">✏️ 点击规则编辑，光标离开自动保存</div>
                    <input type="text" id="editRuleInput" class="edit-input" placeholder="例如: 0→2 或 1→3-5 或 8→1-8">
                </div>
                <div id="selectAbSequenceContainer" class="ab-sequence">加载中...</div>
                <div class="reason">💡 禁止倒卖 转发，一经发现取消授权</div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title"><span>🟦自选规则</span><label class="switch-control"><input type="checkbox" id="matchSwitch" onchange="toggleMatchPanel()"></label></div>
            <div id="rulePanelWrap" style="display:none; margin-top:8px;">
                <div class="rule-import-box">
                    <textarea class="rule-import-input" id="ruleImportText" placeholder="区间规则一键导入&#10;格式：1-4→1-4" oninput="autoSaveRuleImportText()"></textarea>
                    <div class="rule-btn-col">
                        <button class="rule-clear-btn" onclick="clearRuleImportInput()">清空</button>
                        <button class="rule-txt-btn" onclick="importRuleFromTxt()">TXT</button>
                        <button class="rule-import-btn" onclick="importCustomRuleByText()">导入</button>
                    </div>
                </div>
                <div class="hit-rate-display" id="welcomeMessage">大道至简，以简驭繁</div>
                <div class="btn-group">
                    <button onclick="resetRules()">🔄 restore</button>
                    <a href="https://xm2026.github.io/i.html" target="_blank" class="btn-link">🧰 工具</a>
                    <button onclick="clearAllRules()">🗑 A-B</button>
                    <button id="addCustomRuleBtn">➕ ADD</button>
                </div>
                <div class="rule-inputs-container" id="ruleInputsContainer">
                    <div id="fixedRulesContainer">
                        <div class="rule-row" data-idx="1"><div class="rule-index">1</div><input type="text" id="rule1a" placeholder="A" oninput="onRuleChange()"><input type="text" id="rule1b" placeholder="B" oninput="onRuleChange()"></div>
                        <div class="rule-row" data-idx="2"><div class="rule-index">2</div><input type="text" id="rule2a" placeholder="A" oninput="onRuleChange()"><input type="text" id="rule2b" placeholder="B" oninput="onRuleChange()"></div>
                        <div class="rule-row" data-idx="3"><div class="rule-index">3</div><input type="text" id="rule3a" placeholder="A" oninput="onRuleChange()"><input type="text" id="rule3b" placeholder="B" oninput="onRuleChange()"></div>
                        <div class="rule-row" data-idx="4"><div class="rule-index">4</div><input type="text" id="rule4a" placeholder="A" oninput="onRuleChange()"><input type="text" id="rule4b" placeholder="B" oninput="onRuleChange()"></div>
                        <div class="rule-row" data-idx="5"><div class="rule-index">5</div><input type="text" id="rule5a" placeholder="A" oninput="onRuleChange()"><input type="text" id="rule5b" placeholder="B" oninput="onRuleChange()"></div>
                    </div>
                    <div id="customRuleContainer"></div>
                </div>
            </div>
        </div>
        <div class="panel"><div class="result-section" id="compareResult"></div></div>
    </div>
    <div class="footer">© 2026 蚂蚁数据 · v9.3.1 &nbsp;<a href="https://t.me/mayi2036" target="_blank" style="text-decoration:none; color:inherit;">🛫️&nbsp;&nbsp;Telegram</a></div>
</div>

<input type="file" id="importFileInput" accept=".txt" style="display:none" onchange="handleFileSelect(event)">
<input type="file" id="importRuleFileInput" accept=".txt" style="display:none" onchange="handleRuleFileSelect(event)">

<script>
const WORKER_URL = 'https://api.mycm.cc.cd';
const STORAGE_KEY = "ANT_AUTH";
const DEVICE_UUID_KEY = "ANT_DEVICE_UUID";
function getDeviceUUID() {
    let uuid = localStorage.getItem(DEVICE_UUID_KEY);
    if (!uuid) {

    catch (e) { clearTimeout(id); throw e; }
}

async function copyToClipboard(text, tipId) {
    if (!text || text.trim() === '') {
        if (tipId) { let t = document.getElementById(tipId); if (t) t.innerText = '❌ 无内容'; setTimeout(() => { if (t) t.innerText = ''; }, 1500); }
        return false;
    }
    try {
        await navigator.clipboard.writeText(text);
        if (tipId) { let t = document.getElementById(tipId); if (t) t.innerText = '✅ 已复制'; setTimeout(() => t.innerText = '', 1500); }
        return true;
    } catch (e) {
        try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed'; ta.style.top = '-9999px'; ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus(); ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            if (tipId) { let t = document.getElementById(tipId); if (t) t.innerText = ok ? '✅ 已复制' : '❌ 复制失败，请手动复制'; setTimeout(() => t.innerText = '', 2000); }
            return ok;
        } catch (err) {
            if (tipId) { let t = document.getElementById(tipId); if (t) t.innerText = '❌ 复制失败，请长按手动复制'; setTimeout(() => t.innerText = '', 2000); }
            return false;
        }
    }
}

function compareAll(){
    const rules=[];
    for(let i=1;i<=5;i++)rules.push({a:document.getElementById(`rule${i}a`).value.trim(),b:document.getElementById(`rule${i}b`).value.trim()});
    const allRules=[...rules,...state.customRules].filter(r=>r.a&&r.b);
    const rangeText=document.getElementById('rangeData').value.trim();
    const lines=rangeText?rangeText.split('\n').filter(l=>l.trim()):[];
    const gaNums=utils.parseNumbers(document.getElementById('numInput1').value),gbNums=utils.parseNumbers(document.getElementById('numInput2').value);
    const hasGAGB=gaNums.length>0&&gbNums.length>0;
    let resultHtml=`<div class="result-title"><span>🔵 统计结果</span><label class="switch-control">Memo book<input type="checkbox" id="noteSwitch" onchange="toggleNote()"></label></div><div id="statsContent" class="stats-content-container"><textarea id="noteTextarea" class="note-textarea" placeholder="本澳彩盘口统计系统由蚂蚁数据团队研发，欢迎使用！" oninput="storage.autoSaveNote()"></textarea>`;
    if(!hasGAGB){resultHtml+=`</div>`;document.getElementById('compareResult').innerHTML=resultHtml;ui.bindCopyButtons();storage.loadNote();keepNoteState();return;}
    let allCombosSet=new Set(),hitCombosSet=new Set();
    for(let line of lines){
        let arrow=line.match(/(.+?)(?:→|➔|=>|->)(.+)/);
        let aStr='',bStr='';
        if(arrow){aStr=arrow[1].trim();bStr=arrow[2].trim();}
        else{let parts=line.split(/\s+/);if(parts.length>=2){aStr=parts[0];bStr=parts[1];}}
        if(!aStr||!bStr)continue;
        let aVals=rangeToNumbers(aStr),bVals=rangeToNumbers(bStr);
        if(aVals.length===0||bVals.length===0)continue;
        for(let a of aVals)for(let b of bVals){
            let key=`${a},${b}`;
            allCombosSet.add(key);
            let matched=false;
            for(let rule of allRules)if(ruleContains(rule.a,a)&&ruleContains(rule.b,b)){matched=true;break;}
            if(matched)hitCombosSet.add(key);
        }
    }
    let totalCombos=allCombosSet.size,hitCombos=hitCombosSet.size;
    let overallRateHtml=totalCombos>0?`<div class="hit-rate-display">中奖概率：${hitCombos} / ${totalCombos} = ${((hitCombos/totalCombos)*100).toFixed(2)}%</div>`:`<div class="hit-rate-display">组合命中率：0 / 0 = 0.00%</div>`;
    const c1=state.countData[1],c2=state.countData[2];
    if(!c1||!c2){resultHtml+=`</div>`;document.getElementById('compareResult').innerHTML=resultHtml;return;}
    const allNumbers=Array.from({length:49},(_,i)=>i+1);
    const results=[],texts=[];
    allRules.forEach(r=>{
        const resSet=new Set();
        for(let n of allNumbers)if(matchRule(c1[n],r.a)&&matchRule(c2[n],r.b))resSet.add(n);
        results.push(Array.from(resSet).sort((a,b)=>a-b));
        texts.push(`${r.a} → ${r.b}`);
    });
    const finalSet=new Set();
    results.forEach(res=>res.forEach(n=>finalSet.add(n)));
    const final=Array.from(finalSet).sort((a,b)=>a-b);
    const totalStat=getTotalZodiacStat();
    let totalHtml=`<div class="total-zodiac-title">📊 生肖冷热门</div><div class="total-zodiac-list">`;
    totalStat.forEach(([z,n])=>{totalHtml+=`<span class="zodiac-item" onclick="zodiacUI.showTotalZodiacNum('${z}')">${z} ${n}</span>`;});
    totalHtml+=`</div><div class="zodiac-show-num" id="totalZodiacShowNum" style="display:none;margin-top:6px;"></div>`;
    let rulesListHtml='';
    if(showRulesDetail&&allRules.length>0){texts.forEach((text,i)=>{const formattedNumbers=utils.formatNumbers(results[i]);const display=formattedNumbers==='无'?'无':formattedNumbers;rulesListHtml+=`<div class="group-item compare-row">【${text} · ${results[i].length}】：${display}</div>`;});}
    const datetimeStr=getCurrentDateTime();
    let hitRateAndFinalHtml='';
    if(allRules.length>0){hitRateAndFinalHtml=`${overallRateHtml}<div class="group-item final-row">✅ 特码 ·${final.length}：${utils.formatNumbers(final)}<div class="title-right"><button class="copy-btn" data-copy="${utils.formatNumbers(final)}" data-tip="cfTip">Copy</button><span id="cfTip" class="copy-tip"></span><span class="datetime">${datetimeStr}</span></div></div>`;}
    resultHtml+=rulesListHtml+hitRateAndFinalHtml+`<div class="query-zodiac-input"><input id="queryZodiacInput" oninput="zodiacUI.queryZodiac()" placeholder="输入数字查生肖"></div><div class="query-zodiac-result" id="queryZodiacResult"></div><div class="total-zodiac-stat">${totalHtml}</div></div>`;
    document.getElementById('compareResult').innerHTML=resultHtml;
    ui.bindCopyButtons();storage.loadNote();keepNoteState();
}

function handleFileSelect(e){let file=e.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=function(ev){let content=ev.target.result;let parts=content.split(/\.{6,}/);if(parts.length<2){alert("文件格式错误：未找到分隔符 '........'");return;}let ga=parts[0].trim(),gb=parts[1].trim();if(parts.length>2)gb=parts.slice(1).join(' ').trim();document.getElementById('numInput1').value=ga;document.getElementById('numInput2').value=gb;autoCalc(1);autoCalc(2);storage.saveInput();keepNoteState();};reader.readAsText(file);e.target.value='';}

const DATA_API_URL = 'https://mayipan.eu.cc/gab_summary.html';
const RANGE_API_URL='https://mayipan.eu.cc/default_rules.txt';

function isSyncTimeAllowed(){const n=new Date();return n.getHours()===21&&n.getMinutes()>=0&&n.getMinutes()<=10;}
function savePeriodToLocal(pt){pt?localStorage.setItem('last_period',pt):localStorage.removeItem('last_period');}
function restorePeriodDisplay(){let s=localStorage.getItem('last_period'),el=document.getElementById('periodNumber');if(el)el.innerText=s||'';}
async function fetchRemoteData(){
    const resp=await fetch(DATA_API_URL+'?t='+Date.now(),{cache:'no-cache'});
    if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
    const text=await resp.text();
    let ga=null,gb=null;
    const lines=text.split(/\r?\n/);
    for(let i=0;i<lines.length;i++){
        let line=lines[i].trim();
        if(/^G[·\s\-]?A$/i.test(line)&&i+1<lines.length)ga=lines[i+1].trim();
        if(/^G[·\s\-]?B$/i.test(line)&&i+1<lines.length){gb=lines[i+1].trim();break;}
    }
    let periodMatch=text.match(/新澳彩第:\s*(\d{7})期/);
    return{ga,gb,period:periodMatch?periodMatch[0]:null};
}
async function performFullSync(showMsg=false){
    try{
        const{ga,gb,period}=await fetchRemoteData();
        savePeriodToLocal(period);document.getElementById('periodNumber').innerText=period||'';
        if(!ga||!gb){if(showMsg)showToast('❌ 未获取到GA/GB数据');return false;}
        document.getElementById('numInput1').value=ga;document.getElementById('numInput2').value=gb;
        autoCalc(1);autoCalc(2);storage.saveInput();keepNoteState();
        let globalSwitch = document.getElementById('globalStatSwitch');
        let savedState = localStorage.getItem('globalStatVisible');
        globalSwitch.checked = (savedState === '1');
        toggleGlobalStat();
        if(showMsg)showToast('✅ 同步成功');
        return true;
    }catch(err){if(showMsg)showToast(`❌ 同步失败: ${err.message}`);return false;}
}
async function manualSyncSilent(){await performFullSync(false);}

// 手动同步，先验证后同步
async function manualSyncWithAuth(){
    if(!isSyncTimeAllowed()){showToast('⚠️ 手动同步仅限 21:00-21:10 操作');return;}
    const btn=document.getElementById('autoSyncBtn');
    const orig=btn.innerText;
    btn.innerText='⏳ 验证中...';
    btn.disabled=true;
    const code=document.getElementById('authCardCode').value.trim();
    if(!code){showToast('❌ 请先输入授权码并验证');btn.innerText=orig;btn.disabled=false;return;}
    const valid=await verifyAuthWithWorker(code);
    if(!valid){clearAuth();showToast('❌ 授权验证失败');btn.innerText=orig;btn.disabled=false;return;}
    saveAuthCode(code);
    setAllCardControlsEnabled(true);
    showToast('⏳ 同步中...');
    await performFullSync(true);
    await onlineCollectRange();
    btn.innerText=orig;
    btn.disabled=false;
}

async function onlineCollectRange(){
    const btn=document.getElementById('onlineCollectRangeBtn'),orig=btn.innerText;
    btn.innerText='⏳ 采集中...';btn.disabled=true;
    try{
        const resp=await fetch(RANGE_API_URL+'?t='+Date.now());
        if(!resp.ok)throw new Error('fail');
        const data=await resp.text();
        if(!data.trim()){showToast('采集返回数据为空');return;}
        document.getElementById('rangeData').value=data;
        onRangeDataChange();showToast('默认规则在线采集成功');storage.saveRange();keepNoteState();
    }catch{showToast('采集失败');}
    finally{btn.innerText=orig;btn.disabled=false;}
}

let currentEditingType=null,currentEditingA=null,currentEditingIndex=null,pendingEdit=null,isSaving=false;
const editInputElem=document.getElementById('editRuleInput'),editPanelElem=document.getElementById('editRulePanel');
function saveRuleEdit(){if(isSaving||!pendingEdit)return;isSaving=true;const newValue=editInputElem.value.trim();try{if(newValue&&newValue!==pendingEdit.oldValue){currentEditingType=pendingEdit.type;currentEditingA=pendingEdit.a;currentEditingIndex=pendingEdit.index;if(!applyUserEditedRule(newValue))console.warn('save fail');}else if(!newValue)showToast('❌ 规则不能为空');}catch(e){showToast('❌ 保存错误');}finally{editPanelElem.style.display='none';pendingEdit=null;currentEditingType=null;currentEditingA=null;currentEditingIndex=null;isSaving=false;}}
function onEditBlur(){saveRuleEdit();}
function onEditKeypress(e){if(e.key==='Enter'){e.preventDefault();saveRuleEdit();}}
editInputElem.addEventListener('blur',onEditBlur);editInputElem.addEventListener('keypress',onEditKeypress);
function editRule(type,a,value,index){if(pendingEdit)saveRuleEdit();pendingEdit={type,a,index:index!==undefined?index:value,oldValue:`${a}→${value}`};editPanelElem.style.display='block';editInputElem.value=`${a}→${value}`;editInputElem.focus();}
function parseRangeDataToRules(){const text=document.getElementById('rangeData').value;const lines=text.split(/\r?\n/);const rules=[];for(let line of lines){line=line.trim();if(!line)continue;let arrow=line.match(/(.+?)(?:→|➔|=>|->)(.+)/);let aStr='',bStr='';if(arrow){aStr=arrow[1].trim();bStr=arrow[2].trim();}else{let parts=line.split(/\s+/);if(parts.length>=2){aStr=parts[0];bStr=parts[1];}}if(!aStr||!bStr)continue;let aVals=rangeToNumbers(aStr),bVals=rangeToNumbers(bStr);if(aVals.length===0||bVals.length===0)continue;for(let a of aVals)for(let b of bVals)rules.push({a,b});}return rules;}
function updateGridCount(){if(window.selectCurrentData){const{hot,warm,cold}=window.selectCurrentData;let total=hot.size;for(let[,set]of warm)total+=set.size;for(let[,intervals]of cold)for(let inv of intervals)total+=rangeToNumbers(inv).length;document.getElementById('selectRuleGridCount').innerHTML=`${total}格`;}}
function applyUserEditedRule(ruleText){try{if(currentEditingType===null||currentEditingA===null){showToast('❌ 编辑状态丢失');return false;}const parsed=parseRuleLine(ruleText);if(!parsed||parsed.a===undefined||parsed.b===undefined){showToast('❌ 格式错误');return false;}const aStr=parsed.a.trim(),newB=parsed.b.trim();if(!aStr){showToast('❌ A 不能为空');return false;}if(!window.selectCurrentData){showToast('❌ 数据未加载');return false;}function parseAValues(aStr){const vals=new Set();const parts=aStr.split(',');for(let part of parts){part=part.trim();if(part.includes('-')){let[start,end]=part.split('-').map(Number);if(isNaN(start)||isNaN(end))continue;if(start>end)[start,end]=[end,start];for(let i=start;i<=end;i++)vals.add(i);}else{let num=parseInt(part,10);if(!isNaN(num))vals.add(num);}}return Array.from(vals).sort((a,b)=>a-b);}const newAValues=parseAValues(aStr);if(newAValues.length===0){showToast('❌ A 格式无效');return false;}const{hot,warm,cold,coldDetails}=window.selectCurrentData;const oldAStr=currentEditingA.toString();const oldAValues=parseAValues(oldAStr);if(currentEditingType==='hot'){for(let a of oldAValues)if(hot.has(a))hot.delete(a);}else if(currentEditingType==='warm'){for(let a of oldAValues){let ws=warm.get(a);if(ws&&ws.has(currentEditingIndex)){ws.delete(currentEditingIndex);if(ws.size===0)warm.delete(a);}}}else if(currentEditingType==='cold'){for(let a of oldAValues){let intervals=cold.get(a);if(intervals&&currentEditingIndex!==undefined&&intervals[currentEditingIndex]){intervals.splice(currentEditingIndex,1);if(intervals.length===0){cold.delete(a);coldDetails.delete(a);}else{let det=coldDetails.get(a);if(det){det.rules=intervals;det.originalB=[];}}}}}if(currentEditingType==='hot'){for(let a of newAValues)hot.set(a,newB);}else if(currentEditingType==='warm'){for(let a of newAValues){if(!warm.has(a))warm.set(a,new Set());warm.get(a).add(newB);}}else if(currentEditingType==='cold'){const mode=document.getElementById('coldModeSelect').value;for(let a of newAValues){let intervals=cold.get(a)||[];if(mode==='minmax'){cold.set(a,[newB]);coldDetails.set(a,{rule:newB,originalB:[],mode:'minmax'});}else{intervals.push(newB);intervals.sort((x,y)=>{const getStart=str=>{const m=str.match(/^\d+/);return m?parseInt(m[0],10):0;};return getStart(x)-getStart(y);});cold.set(a,intervals);let det=coldDetails.get(a);if(det){det.rules=intervals;det.originalB=[];}else coldDetails.set(a,{rules:intervals,originalB:[],mode:'diff2'});}}}renderSelectRulesFromData();updateGridCount();showToast('✅ 规则已保存');return true;}catch(err){console.error(err);showToast('❌ 保存失败');return false;}}
function renderSelectRulesFromData(){if(!window.selectCurrentData)return;const{stats,hot,warm,cold,coldDetails}=window.selectCurrentData;const html=renderSelectRulesWithTooltip(stats,hot,warm,cold,coldDetails,true);document.getElementById('selectRulesDetail').innerHTML=html;}
let lastRuleCount=0;
function refreshSelectRange(){try{const rules=parseRangeDataToRules();const total=rules.length;const periodInput=document.getElementById('selectPeriodInput');if(periodInput&&total!==lastRuleCount){periodInput.value=total;lastRuleCount=total;}if(total===0){document.getElementById('selectRulesDetail').innerHTML='<div>无数据</div>';document.getElementById('selectAbSequenceContainer').innerHTML='<div class="ab-line">无数据</div>';document.getElementById('selectRuleGridCount').innerHTML='0格';window.selectCurrentData=null;editPanelElem.style.display='none';pendingEdit=null;return;}let period=parseInt(periodInput.value,10);if(isNaN(period)||period<=0)period=total;let actualPeriod=Math.min(period,total);const dataSlice=rules.slice(-actualPeriod);const stats=getBStatsFromRules(dataSlice);const{hot,warm}=getHotWarmFromStats(stats);const mode=document.getElementById('coldModeSelect').value;const{cold,coldDetails}=getColdIntervalsFromStats(stats,hot,warm,mode);const html=renderSelectRulesWithTooltip(stats,hot,warm,cold,coldDetails,true);document.getElementById('selectRulesDetail').innerHTML=html;renderSelectAbSequence(dataSlice);window.selectCurrentData={stats,hot,warm,cold,coldDetails,mode};updateGridCount();}catch(err){console.error(err);document.getElementById('selectRulesDetail').innerHTML='<div style="color:red;">内部错误</div>';showToast('❌ 刷新失败');}}
function getBStatsFromRules(rules){const stats=new Map();for(let{a,b}of rules){if(!stats.has(a))stats.set(a,new Map());const bMap=stats.get(a);bMap.set(b,(bMap.get(b)||0)+1);}return stats;}
function getHotWarmFromStats(stats){const hot=new Map(),warm=new Map();for(let[a,bMap]of stats){let maxCnt=0,hotB=null;for(let[b,cnt]of bMap)if(cnt>maxCnt){maxCnt=cnt;hotB=b;}if(hotB!==null)hot.set(a,hotB);const warmSet=new Set();for(let[b,cnt]of bMap)if(cnt>=2&&b!==hotB)warmSet.add(b);if(warmSet.size)warm.set(a,warmSet);}return{hot,warm};}
function getColdIntervalsFromStats(stats,hot,warm,mode){const cold=new Map(),coldDetails=new Map();for(let[a,bMap]of stats){const covered=new Set();if(hot.has(a))covered.add(hot.get(a));if(warm.has(a))for(let b of warm.get(a))covered.add(b);const coldB=[];for(let b of bMap.keys())if(!covered.has(b))coldB.push(b);coldB.sort((x,y)=>x-y);if(coldB.length===0)continue;if(mode==='minmax'){const minB=coldB[0],maxB=coldB[coldB.length-1];const rule=(minB===maxB)?`${minB}`:`${minB}-${maxB}`;cold.set(a,[rule]);coldDetails.set(a,{rule,originalB:coldB,mode:'minmax'});}else{const intervals=[];let start=coldB[0],prev=start;for(let i=1;i<=coldB.length;i++){const cur=coldB[i];if(cur===undefined||cur-prev>2){intervals.push(start===prev?`${start}`:`${start}-${prev}`);start=cur;prev=cur;}else{prev=cur;}}if(intervals.length){cold.set(a,intervals);coldDetails.set(a,{rules:intervals,originalB:coldB,mode:'diff2'});}}}return{cold,coldDetails};}
function renderSelectRulesWithTooltip(stats,hot,warm,cold,coldDetails,makeClickable=true){function getCountForB(a,bStr){try{const bMap=stats.get(a);if(!bMap)return'?';if(!bStr.includes('-')){let num=parseInt(bStr,10);return bMap.has(num)?bMap.get(num):0;}let parts=bStr.split('-');let start=parseInt(parts[0],10),end=parseInt(parts[1],10);if(isNaN(start)||isNaN(end)||start>end)return'?';let total=0;for(let i=start;i<=end;i++)if(bMap.has(i))total+=bMap.get(i);return total;}catch(e){return'?';}}const hotList=[];for(let[a,b]of hot.entries())hotList.push({a,b});hotList.sort((x,y)=>x.a-y.a);const warmList=[];for(let[a,set]of warm)for(let b of[...set].sort())warmList.push({a,b});warmList.sort((x,y)=>x.a-y.a||x.b-y.b);const coldList=[];for(let[a,intervals]of cold.entries()){const detail=coldDetails.get(a);const originalB=detail?.originalB||[];const mode=detail?.mode||'minmax';for(let idx=0;idx<intervals.length;idx++){const inv=intervals[idx];let title=mode==='minmax'?`❄️ 冷区间(minmax) | A=${a} 历史冷B：${originalB.join(',')} → 合并为区间 ${inv}`:`❄️ 冷区间(diff2) | A=${a} 历史冷B：${originalB.join(',')} → 差两位连续合并为 ${inv}`;coldList.push({a,inv,title,idx});}}coldList.sort((x,y)=>x.a-y.a);let items=[];for(let{a,b}of hotList){const cnt=getCountForB(a,b);const clickAttr=makeClickable?` onclick="editRule('hot', ${a}, '${b}')"`:'';items.push(`<span class="ab-line rule-hot" title="🔥 热规则 | A=${a} → ${b} (出现${cnt}次)"${clickAttr}>${a}→${b}</span>`);}for(let{a,b}of warmList){const cnt=getCountForB(a,b);const clickAttr=makeClickable?` onclick="editRule('warm', ${a}, '${b}')"`:'';items.push(`<span class="ab-line rule-warm" title="🌡️ 温规则 | A=${a} → ${b} (出现${cnt}次)"${clickAttr}>${a}→${b}</span>`);}for(let{a,inv,title,idx}of coldList){const clickAttr=makeClickable?` onclick="editRule('cold', ${a}, '${inv}', ${idx})"`:'';items.push(`<span class="ab-line rule-cold" title="${title}"${clickAttr}>${a}→${inv}</span>`);}return items.join('');}
function renderSelectAbSequence(rules){const seqMap=new Map();for(let{a,b}of rules){if(!seqMap.has(a))seqMap.set(a,[]);seqMap.get(a).push(b);}let html='';for(let a=0;a<=9;a++){const list=seqMap.get(a);html+=`A=${a} → B：${list?list.join(','):'无记录'}\n`;}document.getElementById('selectAbSequenceContainer').innerHTML=`<div style="white-space:pre-wrap; font-family:monospace; font-size:12px; line-height:1.4; background:transparent;">${html}</div>`;}
function importRulesToConfig(rulesList){if(!rulesList||rulesList.length===0){showToast('无规则可导入');return;}const sortedList=[...rulesList].sort((x,y)=>{const a1=parseInt(x.a,10),a2=parseInt(y.a,10);if(a1!==a2)return a1-a2;return x.b.localeCompare(y.b);});let cnt=0;for(let rule of sortedList){if(fillRuleToSlots(rule.a.toString(),rule.b.toString()))cnt++;}if(cnt>0){showToast(`✅ 已导入 ${cnt} 条规则`);onRuleChange();}else showToast('⚠️ 没有空闲位置');}
function importHotRules(){if(!window.selectCurrentData){refreshSelectRange();setTimeout(()=>{if(window.selectCurrentData)doImportHot();else showToast('无数据');},150);return;}doImportHot();}
function doImportHot(){const{hot}=window.selectCurrentData;const list=[];for(let[a,b]of hot.entries())list.push({a:a.toString(),b:b.toString()});list.sort((x,y)=>parseInt(x.a)-parseInt(y.a));importRulesToConfig(list);}
function importWarmRules(){if(!window.selectCurrentData){refreshSelectRange();setTimeout(()=>{if(window.selectCurrentData)doImportWarm();else showToast('无数据');},150);return;}doImportWarm();}
function doImportWarm(){const{warm}=window.selectCurrentData;const list=[];for(let[a,set]of warm)for(let b of[...set].sort())list.push({a:a.toString(),b:b.toString()});list.sort((x,y)=>parseInt(x.a)-parseInt(y.a)||x.b.localeCompare(y.b));importRulesToConfig(list);}
function importColdRules(){if(!window.selectCurrentData){refreshSelectRange();setTimeout(()=>{if(window.selectCurrentData)doImportCold();else showToast('无数据');},150);return;}doImportCold();}
function doImportCold(){const{cold}=window.selectCurrentData;const list=[];for(let[a,intervals]of cold.entries())for(let inv of intervals)list.push({a:a.toString(),b:inv});importRulesToConfig(list);}

function initApp() {
    storage.loadInput(); storage.loadRange();
    if (!document.getElementById('rangeData').value.trim()) { document.getElementById('rangeData').value = ''; storage.saveRange(); }
    storage.loadRuleImportText(); bindPaste(); clearAllRules();
    autoCalc(1); autoCalc(2);
    setTimeout(() => { compareAll(); refreshSelectRange(); }, 100);
    document.getElementById('globalStatSwitch').checked = (localStorage.getItem('globalStatVisible') == '1');
    toggleGlobalStat();
    restorePeriodDisplay();
    document.getElementById('selectPeriodInput').addEventListener('blur', refreshSelectRange);
    document.getElementById('refreshSelectRulesBtn').onclick = () => { clearAllRules(); refreshSelectRange(); };
    document.getElementById('importSelectHotBtn').onclick = importHotRules;
    document.getElementById('importSelectWarmBtn').onclick = importWarmRules;
    document.getElementById('importSelectColdBtn').onclick = importColdRules;
    document.getElementById('coldModeSelect').onchange = () => refreshSelectRange();
    document.getElementById('importRulesFromRangeBtn').onclick = importRulesFromRange;
    document.getElementById('onlineCollectRangeBtn').onclick = onlineCollectRange;
    document.getElementById('openVipBtn').onclick = openVip;
    document.getElementById('openPmBtn').onclick = openPm;
    document.getElementById('autoSyncBtn').onclick = manualSyncWithAuth;
    document.getElementById('addCustomRuleBtn').onclick = addCustomRule;
    let antIcon = document.getElementById('antIcon');
    if (antIcon) { antIcon.removeEventListener('click', manualSyncSilent); antIcon.addEventListener('click', e => { e.stopPropagation(); manualSyncSilent(); }); }
    refreshSelectRange();
    window.editRule = editRule; showRulesDetail = false;
    updateInputAreaVisibility(); loadMarqueeText(); keepNoteState();
    document.getElementById('authCardDeviceCode').innerText = getDeviceUUID();
}

document.getElementById('authCardDeviceCode').onclick = () => copyToClipboard(getDeviceUUID(), 'authCardTip');
document.getElementById('authCardVerifyBtn').onclick = async () => {
    const code = document.getElementById('authCardCode').value.trim();
    const tip = document.getElementById('authCardTip');
    if (!code) {
        clearAuth();
        setAllCardControlsEnabled(false);
        tip.textContent = '无效';
        tip.style.color = '#ff6666';
        return;
    }
    tip.textContent = '验证中...';
    if (await verifyAuthWithWorker(code)) {
        saveAuthCode(code);
        setAllCardControlsEnabled(true);
        tip.textContent = '通过';
        tip.style.color = '#6cce6c';
    } else {
        clearAuth();
        setAllCardControlsEnabled(false);
        tip.textContent = '无效';
        tip.style.color = '#ff6666';
    }
};

window.onload = () => {
    const savedAuth = localStorage.getItem(STORAGE_KEY);
    if (savedAuth) {
        document.getElementById('authCardCode').value = savedAuth;
        verifyAuthWithWorker(savedAuth).then(valid => {
            if (valid) {
                setAllCardControlsEnabled(true);
                document.getElementById('authCardTip').textContent = '通过';
                document.getElementById('authCardTip').style.color = '#6cce6c';
            } else {
                clearAuth();
                setAllCardControlsEnabled(false);
                document.getElementById('authCardTip').textContent = '无效';
                document.getElementById('authCardTip').style.color = '#ff6666';
            }
        });
    } else {
        setAllCardControlsEnabled(false);
    }
    initApp();
};

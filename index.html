<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>蚂蚁数据 · 盘口自动统计</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#121212; color:#eee; font-family: system-ui, sans-serif; padding: 16px; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: #1e1e1e; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 16px; text-align: center; }
        .device-box { background: #2a2a2a; border-radius: 16px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .device-code { font-family: monospace; font-size: 18px; letter-spacing: 1px; word-break: break-all; }
        button { background: #007bff; border: none; color: white; padding: 10px 16px; border-radius: 40px; font-size: 14px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .btn-secondary { background: #3a3a3a; }
        input, textarea { width: 100%; padding: 12px; background: #2a2a2a; border: none; border-radius: 40px; color: white; font-size: 14px; margin: 8px 0; }
        textarea { border-radius: 16px; resize: vertical; font-family: monospace; }
        .error { color: #ff8866; }
        .success { color: #66cc66; }
        .sync-panel { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .result-area { margin-top: 20px; background: #2a2a2a; border-radius: 16px; padding: 12px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .footer { text-align: center; font-size: 12px; color: #666; margin-top: 24px; }
        .stats { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 20px; }
        .stats-col { flex: 1; background: #2a2a2a; border-radius: 16px; padding: 12px; }
        .hit-rate { background: #1e3a2e; padding: 8px; border-radius: 12px; text-align: center; margin: 12px 0; }
        .rule-row { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
        .rule-row input { flex: 1; margin: 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🐜 蚂蚁数据 · AI 盘口统计</h1>
        <div class="device-box">
            <span>📱 设备码：</span>
            <span class="device-code" id="deviceCode">加载中...</span>
            <button id="copyDeviceBtn" class="btn-secondary">复制</button>
        </div>
        <input type="password" id="authCodeInput" placeholder="请输入授权码">
        <button id="verifyBtn">🔓 验证授权</button>
        <div id="authMessage" style="margin-top: 12px; text-align: center;"></div>
        
        <div id="syncPanel" style="display: none;">
            <div class="sync-panel">
                <button id="syncDataBtn">📡 同步 G·A / G·B</button>
                <button id="syncRulesBtn">📜 同步默认规则</button>
            </div>
            
            <div class="stats">
                <div class="stats-col">
                    <div style="font-weight: bold; margin-bottom: 8px;">G · A 盘口数据</div>
                    <textarea id="gaData" rows="3" placeholder="同步后自动填充"></textarea>
                </div>
                <div class="stats-col">
                    <div style="font-weight: bold; margin-bottom: 8px;">G · B 盘口数据</div>
                    <textarea id="gbData" rows="3" placeholder="同步后自动填充"></textarea>
                </div>
            </div>
            
            <div style="margin-top: 16px;">
                <div style="font-weight: bold; margin-bottom: 8px;">📜 默认规则（A→B）</div>
                <textarea id="rulesData" rows="4" placeholder="同步后自动填充"></textarea>
            </div>
            
            <div id="statsResult" class="result-area" style="margin-top: 16px;">
                等待同步数据...
            </div>
        </div>
    </div>
    <div class="footer">
        © 2026 蚂蚁数据 · <a href="https://t.me/mayi2036" target="_blank" style="color:#888;">Telegram</a>
    </div>
</div>

<script>
    // ========== Worker 地址 ==========
    const WORKER_URL = 'https://api.mycm.cc.cd';
    const STORAGE_KEY = 'ANT_AUTH';

    // ========== 设备码（永久 UUID） ==========
    function getDeviceUUID() {
        let uuid = localStorage.getItem('ANT_DEVICE_UUID');
        if (!uuid) {
            uuid = crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
            localStorage.setItem('ANT_DEVICE_UUID', uuid);
        }
        return uuid;
    }
    document.getElementById('deviceCode').innerText = getDeviceUUID();
    document.getElementById('copyDeviceBtn').onclick = () => {
        navigator.clipboard.writeText(getDeviceUUID());
        alert('设备码已复制');
    };

    // ========== 带超时的 fetch ==========
    async function fetchWithTimeout(url, options = {}, timeout = 10000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (err) {
            clearTimeout(id);
            throw err;
        }
    }

    // ========== 验证授权 ==========
    async function verifyAuth(authCode) {
        if (!authCode) return false;
        const device = getDeviceUUID();
        try {
            const resp = await fetchWithTimeout(`${WORKER_URL}/verify`, {
                method: 'GET',
                headers: {
                    'X-Device-Code': device,
                    'X-Auth-Code': authCode
                }
            }, 10000);
            const data = await resp.json();
            return data.valid === true;
        } catch (err) {
            console.error(err);
            return false;
        }
    }

    const verifyBtn = document.getElementById('verifyBtn');
    const authInput = document.getElementById('authCodeInput');
    const authMsg = document.getElementById('authMessage');
    const syncPanel = document.getElementById('syncPanel');

    verifyBtn.onclick = async () => {
        const authCode = authInput.value.trim();
        if (!authCode) {
            authMsg.innerHTML = '<span class="error">❌ 请输入授权码</span>';
            return;
        }
        authMsg.innerHTML = '⏳ 验证中...';
        const valid = await verifyAuth(authCode);
        if (valid) {
            localStorage.setItem(STORAGE_KEY, authCode);
            authMsg.innerHTML = '<span class="success">✅ 授权成功！可以同步数据了</span>';
            syncPanel.style.display = 'block';
            loadSavedData();
        } else {
            authMsg.innerHTML = '<span class="error">❌ 授权码无效或已过期，请联系 @mayiya_bot</span>';
            syncPanel.style.display = 'none';
        }
    };

    // ========== 通用同步函数 ==========
    async function sync(endpoint, targetId, successMsg) {
        const authCode = localStorage.getItem(STORAGE_KEY);
        if (!authCode) {
            alert('请先验证授权');
            return;
        }
        const device = getDeviceUUID();
        const targetElem = document.getElementById(targetId);
        if (targetElem && targetId !== 'gaData') targetElem.value = '⏳ 请求中...';
        try {
            const resp = await fetchWithTimeout(`${WORKER_URL}/${endpoint}`, {
                headers: {
                    'X-Device-Code': device,
                    'X-Auth-Code': authCode
                }
            }, 15000);
            if (resp.status === 401) {
                alert('授权已失效，请重新验证');
                localStorage.removeItem(STORAGE_KEY);
                syncPanel.style.display = 'none';
                return;
            }
            const text = await resp.text();
            if (endpoint === 'sync') {
                const lines = text.split(/\r?\n/).filter(l => l.trim() && /\d/.test(l));
                let ga = '', gb = '';
                for (let line of lines) {
                    const nums = line.match(/\b([1-9]|[1-4][0-9]|49)\b/g);
                    if (nums && nums.length) {
                        if (!ga) ga = nums.join(' ');
                        else if (!gb) { gb = nums.join(' '); break; }
                    }
                }
                document.getElementById('gaData').value = ga || '无数据';
                document.getElementById('gbData').value = gb || '无数据';
                localStorage.setItem('saved_ga', ga);
                localStorage.setItem('saved_gb', gb);
                calculateStats();
            } else if (endpoint === 'rules') {
                document.getElementById('rulesData').value = text;
                localStorage.setItem('saved_rules', text);
                calculateStats();
            }
            alert(successMsg);
        } catch (err) {
            if (targetElem && targetId !== 'gaData') targetElem.value = '同步失败：' + err.message;
            alert('同步失败：' + err.message);
        }
    }

    document.getElementById('syncDataBtn').onclick = () => sync('sync', 'gaData', '数据同步完成');
    document.getElementById('syncRulesBtn').onclick = () => sync('rules', 'rulesData', '规则同步完成');

    function loadSavedData() {
        const ga = localStorage.getItem('saved_ga');
        const gb = localStorage.getItem('saved_gb');
        const rules = localStorage.getItem('saved_rules');
        if (ga) document.getElementById('gaData').value = ga;
        if (gb) document.getElementById('gbData').value = gb;
        if (rules) document.getElementById('rulesData').value = rules;
        if (ga && gb) calculateStats();
    }

    // ========== 统计功能 ==========
    function parseNumbers(str) {
        const matches = str.match(/\b([1-9]|[1-4][0-9]|49)\b/g);
        return matches ? matches.map(Number) : [];
    }

    function rangeToNumbers(range) {
        range = range.trim();
        if (!range) return [];
        if (range.includes('-')) {
            let [s, e] = range.split('-').map(Number);
            if (isNaN(s) || isNaN(e)) return [];
            if (s > e) [s, e] = [e, s];
            let arr = [];
            for (let i = s; i <= e; i++) arr.push(i);
            return arr;
        }
        let n = parseInt(range);
        return isNaN(n) ? [] : [n];
    }

    function calculateStats() {
        const gaText = document.getElementById('gaData').value;
        const gbText = document.getElementById('gbData').value;
        const rulesText = document.getElementById('rulesData').value;
        
        const gaNums = parseNumbers(gaText);
        const gbNums = parseNumbers(gbText);
        
        if (gaNums.length === 0 || gbNums.length === 0) {
            document.getElementById('statsResult').innerHTML = '请先同步 G·A 和 G·B 数据';
            return;
        }
        
        const gaCount = new Array(50).fill(0);
        const gbCount = new Array(50).fill(0);
        gaNums.forEach(n => gaCount[n]++);
        gbNums.forEach(n => gbCount[n]++);
        
        const rules = [];
        const lines = rulesText.split(/\r?\n/);
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            let arrow = line.match(/(.+?)(?:→|➔|=>|->)(.+)/);
            let aStr, bStr;
            if (arrow) { aStr = arrow[1].trim(); bStr = arrow[2].trim(); }
            else { let parts = line.split(/\s+/); if (parts.length >= 2) { aStr = parts[0]; bStr = parts[1]; } }
            if (aStr && bStr) rules.push({ a: aStr, b: bStr });
        }
        
        let totalCombos = 0, hitCombos = 0;
        for (let a = 0; a <= 9; a++) {
            const aVals = rangeToNumbers(a.toString());
            if (aVals.length === 0) continue;
            for (let b = 0; b <= 9; b++) {
                const bVals = rangeToNumbers(b.toString());
                if (bVals.length === 0) continue;
                totalCombos++;
                let matched = false;
                for (let rule of rules) {
                    const ruleAVals = rangeToNumbers(rule.a);
                    const ruleBVals = rangeToNumbers(rule.b);
                    if (ruleAVals.includes(a) && ruleBVals.includes(b)) {
                        matched = true;
                        break;
                    }
                }
                if (matched) hitCombos++;
            }
        }
        
        const hitRate = totalCombos > 0 ? (hitCombos / totalCombos * 100).toFixed(2) : 0;
        let maxGa = Math.max(...gaCount);
        let maxGb = Math.max(...gbCount);
        let hotGa = [], hotGb = [];
        for (let i = 1; i <= 49; i++) {
            if (gaCount[i] === maxGa && maxGa > 0) hotGa.push(i);
            if (gbCount[i] === maxGb && maxGb > 0) hotGb.push(i);
        }
        
        const html = `
            <div class="hit-rate">🎯 命中概率：${hitCombos} / ${totalCombos} = ${hitRate}%</div>
            <div><strong>📊 G·A 高频数字（${maxGa}次）</strong>：${hotGa.join(', ') || '无'}</div>
            <div style="margin-top: 8px;"><strong>📊 G·B 高频数字（${maxGb}次）</strong>：${hotGb.join(', ') || '无'}</div>
            <div style="margin-top: 12px; font-size: 12px; color: #aaa;">✅ 已同步 ${gaNums.length} 个 G·A 数字，${gbNums.length} 个 G·B 数字</div>
        `;
        document.getElementById('statsResult').innerHTML = html;
    }

    document.getElementById('gaData').addEventListener('input', () => {
        localStorage.setItem('saved_ga', document.getElementById('gaData').value);
        calculateStats();
    });
    document.getElementById('gbData').addEventListener('input', () => {
        localStorage.setItem('saved_gb', document.getElementById('gbData').value);
        calculateStats();
    });
    document.getElementById('rulesData').addEventListener('input', () => {
        localStorage.setItem('saved_rules', document.getElementById('rulesData').value);
        calculateStats();
    });

    (async () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const valid = await verifyAuth(saved);
            if (valid) {
                authMsg.innerHTML = '<span class="success">✅ 已有有效授权，可直接同步</span>';
                syncPanel.style.display = 'block';
                authInput.value = saved;
                loadSavedData();
            } else {
                localStorage.removeItem(STORAGE_KEY);
                authMsg.innerHTML = '<span class="error">⚠️ 本地授权已过期，请重新输入</span>';
            }
        }
    })();
</script>
</body>
</html>

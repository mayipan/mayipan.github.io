<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权码管理 · 一机一码</title>
    <style>
        body { background:#0a0a0a; color:#eee; font-family: system-ui; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        button { background: #007bff; border: none; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer; }
        input, textarea { background: #2a2a2a; border: none; padding: 10px; border-radius: 40px; color: white; width: 100%; margin: 8px 0; }
        .success { color: #6fcf97; }
        .error { color: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 一机一码 · 授权绑定</h2>
    <div>
        <input type="text" id="deviceCode" placeholder="用户设备码 (UUID)">
        <input type="text" id="authCode" placeholder="授权码 (可手动输入)">
        <button id="generateAuthBtn">🎲 生成随机授权码</button>
        <button id="bindBtn">🔗 绑定并生效</button>
    </div>
    <div id="message" style="margin-top: 12px;"></div>
</div>

<div class="card">
    <h3>📋 当前绑定列表</h3>
    <div style="margin-bottom: 12px;">
        <button id="refreshListBtn">刷新列表</button>
        <button id="exportListBtn">导出 JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
        <button id="importBtn">导入 JSON</button>
    </div>
    <table id="bindTable">
        <thead><tr><th>设备码</th><th>授权码</th><th>操作</th></tr></thead>
        <tbody></tbody>
    </table>
    <div class="note" style="margin-top: 12px; font-size: 12px; color: #aaa;">
        💡 说明：绑定后，该设备码只能使用对应的授权码验证。导入/导出功能用于备份或迁移绑定关系。
    </div>
</div>

<script>
    const WORKER_URL = 'https://api.mycm.cc.cd';
    const ADMIN_KEY = 'my_secret_admin_key_123'; // 必须与 Worker 环境变量 ADMIN_KEY 一致

    // 生成随机授权码（8位字母数字）
    function generateAuthCode() {
        return Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    document.getElementById('generateAuthBtn').onclick = () => {
        document.getElementById('authCode').value = generateAuthCode();
    };

    // 调用 Worker 绑定接口
    async function bindDevice(deviceCode, authCode) {
        const resp = await fetch(`${WORKER_URL}/admin/bind`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Admin-Key': ADMIN_KEY
            },
            body: JSON.stringify({ deviceCode, authCode })
        });
        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.error || '绑定失败');
        }
        return await resp.json();
    }

    document.getElementById('bindBtn').onclick = async () => {
        const deviceCode = document.getElementById('deviceCode').value.trim();
        const authCode = document.getElementById('authCode').value.trim();
        if (!deviceCode || !authCode) {
            showMessage('请填写设备码和授权码', 'error');
            return;
        }
        showMessage('⏳ 绑定中...', '');
        try {
            await bindDevice(deviceCode, authCode);
            showMessage(`✅ 绑定成功：${deviceCode} → ${authCode}`, 'success');
            // 可选：添加到本地列表（如果 Worker 不支持查询所有绑定，则需手动维护）
            addToLocalList(deviceCode, authCode);
            renderLocalList();
        } catch (err) {
            showMessage(`❌ 绑定失败：${err.message}`, 'error');
        }
    };

    // ========== 本地存储绑定列表（用于展示和管理） ==========
    // 注意：Worker 的 KV 无法直接列出所有键（除非使用 list），这里用本地存储模拟管理端列表
    const STORAGE_KEY = 'ADMIN_BINDINGS';

    function getLocalBindings() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
    }

    function saveLocalBindings(bindings) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(bindings));
    }

    function addToLocalList(deviceCode, authCode) {
        let bindings = getLocalBindings();
        // 如果已存在则更新
        const existing = bindings.find(b => b.deviceCode === deviceCode);
        if (existing) {
            existing.authCode = authCode;
        } else {
            bindings.push({ deviceCode, authCode });
        }
        saveLocalBindings(bindings);
    }

    function deleteFromLocalList(deviceCode) {
        let bindings = getLocalBindings();
        bindings = bindings.filter(b => b.deviceCode !== deviceCode);
        saveLocalBindings(bindings);
        renderLocalList();
    }

    function renderLocalList() {
        const bindings = getLocalBindings();
        const tbody = document.querySelector('#bindTable tbody');
        if (bindings.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">暂无绑定</td></tr>';
            return;
        }
        let html = '';
        bindings.forEach(b => {
            html += `<tr>
                <td><code>${escapeHtml(b.deviceCode)}</code></td>
                <td><code>${escapeHtml(b.authCode)}</code></td>
                <td><button onclick="deleteBinding('${escapeHtml(b.deviceCode)}')">删除</button></td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    window.deleteBinding = (deviceCode) => {
        if (confirm(`确定要解除设备 ${deviceCode} 的绑定吗？`)) {
            // 注意：这里只是删除本地记录，Worker 中的绑定需要另外调用删除接口（可选）
            deleteFromLocalList(deviceCode);
            showMessage('已从本地列表中删除，请记得同步删除 Worker 中的绑定（如有需要）', '');
        }
    };

    function exportBindings() {
        const bindings = getLocalBindings();
        const dataStr = JSON.stringify(bindings, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `bindings_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function importBindings(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    saveLocalBindings(imported);
                    renderLocalList();
                    showMessage('导入成功', 'success');
                } else {
                    throw new Error('格式错误');
                }
            } catch(err) {
                showMessage('导入失败：无效的 JSON', 'error');
            }
        };
        reader.readAsText(file);
    }

    document.getElementById('refreshListBtn').onclick = () => renderLocalList();
    document.getElementById('exportListBtn').onclick = exportBindings;
    document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = (e) => {
        if (e.target.files.length) importBindings(e.target.files[0]);
        e.target.value = '';
    };

    function showMessage(msg, type) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerHTML = msg;
        msgDiv.className = type === 'success' ? 'success' : (type === 'error' ? 'error' : '');
        setTimeout(() => { if (msgDiv.innerHTML === msg) msgDiv.innerHTML = ''; }, 3000);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    renderLocalList();
</script>
</body>
</html>

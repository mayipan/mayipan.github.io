<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAYI · 盘口自动统计</title>
    <style>
        /* 样式保持原样，为节省篇幅略，您可以使用之前完整的样式，或者直接用下面的最小样式 */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#121212; color:#eee; padding:16px; font-family: system-ui; }
        .container { max-width:700px; margin:0 auto; }
        .tool-box { background:#1a1a1a; padding:16px; border-radius:24px; }
        .auth-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .auth-box { background:#1e1e1e; border-radius:32px; padding:28px 24px; width:90%; max-width:360px; text-align:center; }
        .device-info { background:#252525; padding:10px; border-radius:8px; margin:12px 0; display:flex; justify-content:space-between; }
        .auth-input { width:100%; padding:10px; margin:10px 0; border-radius:8px; background:#252525; color:#fff; border:none; }
        .auth-btn { background:#007bff; color:#fff; border:none; padding:12px; border-radius:8px; width:100%; cursor:pointer; }
        button { cursor:pointer; }
        .btn-group { display:flex; gap:8px; margin:12px 0; }
        textarea { width:100%; background:#222; color:#eee; border:none; padding:8px; border-radius:8px; }
        .result-section { margin-top:16px; background:#222; padding:12px; border-radius:16px; }
    </style>
</head>
<body>
<div class="auth-modal" id="authModal">
    <div class="auth-box">
        <h2>🔒 授权验证</h2>
        <div style="color:#ccc;">你的设备串码：</div>
        <div class="device-info"><span id="deviceCode">Loading...</span><button class="copy-code-btn" onclick="copyDeviceCode()">📋 Copy</button></div>
        <div style="color:#ccc;margin-top:10px;">请输入授权码：</div>
        <input type="text" class="auth-input" id="authCode" placeholder="输入授权码">
        <button class="auth-btn" onclick="checkAuth()">确认验证</button>
        <div class="auth-tip" id="authTip"></div>
        <div class="auth-footer" style="margin-top:12px;font-size:12px;color:#888;">
            请将【设备串码】发送给 @mayiya_bot 获取授权码
        </div>
    </div>
</div>

<div class="container">
    <div class="tool-box">
        <h1>Ant Data AI Stats Tool</h1>
        <div class="btn-group">
            <button id="autoSyncBtn">⚙️ 自动同步关</button>
            <button id="onlineCollectRangeBtn">🌐 同步规则</button>
        </div>
        <div class="input-box">
            <textarea id="numInput1" placeholder="G · A 数据" rows="3"></textarea>
            <textarea id="numInput2" placeholder="G · B 数据" rows="3"></textarea>
        </div>
        <div class="result-section" id="compareResult"></div>
    </div>
</div>

<script>
// ==================== 配置 ====================
const WORKER_URL = '__WORKER_URL__';   // ⚠️ 替换为你的 Worker 地址，如 'https://api.mycm.cc.cd'
const SECRET_SALT = "ANT2026_ZODIAC";
const STORAGE_KEY = "ANT_AUTH";

// ==================== 设备码生成（每次实时计算，不依赖 localStorage 存储） ====================
function getDeviceCode() {
    const temp = [navigator.userAgent, screen.width, screen.height, navigator.language].join("|");
    let hash = 0;
    for (let i = 0; i < temp.length; i++) {
        hash = ((hash << 5) - hash) + temp.charCodeAt(i);
        hash = hash & hash;
    }
    return Math.abs(hash).toString(16).toUpperCase();
}

// 复制设备码
async function copyDeviceCode() {
    const code = document.getElementById("deviceCode").innerText;
    try {
        await navigator.clipboard.writeText(code);
        document.getElementById("authTip").innerText = "✅ 已复制";
        setTimeout(() => document.getElementById("authTip").innerText = "", 1500);
    } catch(e) { alert("复制失败"); }
}

// ==================== 后端验证 ====================
async function verifyWithBackend(authCode) {
    if (!authCode) return false;
    const deviceCode = getDeviceCode();
    if (!deviceCode) return false;
    try {
        const response = await fetch(`${WORKER_URL}/verify`, {
            method: 'GET',
            headers: {
                'X-Device-Code': deviceCode,
                'X-Auth-Code': authCode
            }
        });
        const data = await response.json();
        return data.valid === true;
    } catch (err) {
        console.error('验证请求失败', err);
        return false;
    }
}

async function checkAuth() {
    const authCode = document.getElementById("authCode").value.trim();
    const tip = document.getElementById("authTip");
    if (!authCode) {
        tip.textContent = "请输入授权码！";
        return;
    }
    tip.textContent = "验证中...";
    const valid = await verifyWithBackend(authCode);
    if (valid) {
        localStorage.setItem(STORAGE_KEY, authCode);
        tip.style.color = "#6cce6c";
        tip.textContent = "✅ 验证成功！";
        setTimeout(() => document.getElementById("authModal").style.display = "none", 800);
    } else {
        tip.style.color = "#ff6666";
        tip.textContent = "❌ 授权码无效或已过期 联系 @mayiya_bot";
    }
}

// ==================== 数据同步 ====================
async function performSync() {
    const authCode = localStorage.getItem(STORAGE_KEY);
    if (!authCode) {
        showToast('请先输入授权码');
        document.getElementById("authModal").style.display = "flex";
        document.getElementById('deviceCode').innerText = getDeviceCode();
        return;
    }
    const deviceCode = getDeviceCode();
    try {
        const response = await fetch(`${WORKER_URL}/sync`, {
            headers: {
                'X-Device-Code': deviceCode,
                'X-Auth-Code': authCode
            }
        });
        if (response.status === 401) {
            showToast('授权失效，请重新输入授权码');
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById("authModal").style.display = "flex";
            document.getElementById('deviceCode').innerText = getDeviceCode();
            return;
        }
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        // 解析数据（简单取前两行有效数字行）
        const lines = text.split(/\r?\n/);
        const validLines = [];
        for (let line of lines) {
            const trimmed = line.trim();
            if (trimmed && /\d/.test(trimmed) && !trimmed.includes('期')) {
                validLines.push(trimmed);
                if (validLines.length >= 2) break;
            }
        }
        if (validLines.length >= 2) {
            document.getElementById('numInput1').value = validLines[0];
            document.getElementById('numInput2').value = validLines[1];
            showToast('同步成功');
        } else {
            throw new Error('数据格式错误');
        }
    } catch (err) {
        showToast(`同步失败: ${err.message}`);
    }
}

async function onlineCollectRange() {
    const authCode = localStorage.getItem(STORAGE_KEY);
    if (!authCode) {
        showToast('请先输入授权码');
        document.getElementById("authModal").style.display = "flex";
        document.getElementById('deviceCode').innerText = getDeviceCode();
        return;
    }
    const deviceCode = getDeviceCode();
    const btn = document.getElementById('onlineCollectRangeBtn');
    const originalText = btn.innerText;
    btn.innerText = '采集中...';
    btn.disabled = true;
    try {
        const response = await fetch(`${WORKER_URL}/rules`, {
            headers: {
                'X-Device-Code': deviceCode,
                'X-Auth-Code': authCode
            }
        });
        if (response.status === 401) {
            showToast('授权失效，请重新输入授权码');
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById("authModal").style.display = "flex";
            document.getElementById('deviceCode').innerText = getDeviceCode();
            return;
        }
        const dataText = await response.text();
        if (dataText.trim()) {
            // 假设规则数据展示在某个文本框，这里简单提示
            showToast('规则采集成功');
        } else {
            showToast('数据为空');
        }
    } catch (err) {
        showToast('采集失败');
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.backgroundColor = '#333';
    toast.style.color = '#fff';
    toast.style.padding = '8px 16px';
    toast.style.borderRadius = '20px';
    toast.style.zIndex = '10000';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// 自动同步时间窗口逻辑（简化）
let autoSyncInterval = null;
let isAutoSyncing = false;
function isSyncTimeAllowed() {
    const now = new Date();
    return now.getHours() === 21 && now.getMinutes() <= 10;
}
function toggleAutoSync() {
    if (!isSyncTimeAllowed()) {
        showToast('⚠️ 自动同步仅限 21:00-21:10');
        return;
    }
    const btn = document.getElementById('autoSyncBtn');
    if (isAutoSyncing) {
        if (autoSyncInterval) clearInterval(autoSyncInterval);
        isAutoSyncing = false;
        btn.innerText = '⚙️ 自动同步关';
        showToast('已关闭自动同步');
    } else {
        isAutoSyncing = true;
        btn.innerText = '⏳ 自动同步开';
        performSync();
        autoSyncInterval = setInterval(() => {
            if (isSyncTimeAllowed()) performSync();
            else toggleAutoSync();
        }, 5 * 60 * 1000);
        showToast('已开启自动同步');
    }
}

// 页面初始化
window.onload = function() {
    // 显示设备码
    document.getElementById('deviceCode').innerText = getDeviceCode();
    // 检查授权
    const savedAuth = localStorage.getItem(STORAGE_KEY);
    if (savedAuth) {
        verifyWithBackend(savedAuth).then(valid => {
            if (!valid) {
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById("authModal").style.display = "flex";
            } else {
                document.getElementById("authModal").style.display = "none";
            }
        });
    } else {
        document.getElementById("authModal").style.display = "flex";
    }
    // 绑定事件
    document.getElementById('autoSyncBtn').onclick = toggleAutoSync;
    document.getElementById('onlineCollectRangeBtn').onclick = onlineCollectRange;
};
</script>
</body>
</html>

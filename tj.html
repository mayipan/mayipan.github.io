<script>
// ==================== 授权管理核心 ====================
const SECRET_SALT = "ANT2026_ZODIAC";
const STORAGE_KEY = "ANT_AUTH";

function getDeviceCode() {
    try {
        let code = localStorage.getItem("device_code");
        if (!code) {
            const temp = [navigator.userAgent, screen.width, screen.height, navigator.language].join("|");
            let hash = 0;
            for (let i = 0; i < temp.length; i++) {
                hash = ((hash << 5) - hash) + temp.charCodeAt(i);
                hash = hash & hash;
            }
            code = Math.abs(hash).toString(16).toUpperCase();
            localStorage.setItem("device_code", code);
        }
        return code;
    } catch(e) { return "UNKNOWN_DEVICE"; }
}

async function copyToClipboard(text, tipId) {
    if (!text || text.trim() === '') {
        if (tipId) {
            const tipEl = document.getElementById(tipId);
            if (tipEl) tipEl.innerText = '❌ 无内容';
            setTimeout(() => { if (tipEl) tipEl.innerText = ''; }, 1500);
        }
        return false;
    }
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.top = '-9999px';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    let success = false;
    try {
        success = document.execCommand('copy');
    } catch (e) {
        console.error('复制失败', e);
    }
    document.body.removeChild(textarea);
    if (tipId) {
        const tipEl = document.getElementById(tipId);
        if (tipEl) {
            tipEl.innerText = success ? '✅已Copy' : '❌Copy失败';
            setTimeout(() => tipEl.innerText = '', 1500);
        }
    }
    return success;
}

function validateAuth(device, auth) {
    try {
        const [t, s] = auth.split("_");
        const et = Number(t);
        if (et < Date.now()) return false;
        let hash = 0;
        const raw = device + SECRET_SALT + et;
        for (let i = 0; i < raw.length; i++) {
            hash = ((hash << 5) - hash) + raw.charCodeAt(i);
            hash = hash & hash;
        }
        const cs = Math.abs(hash).toString(16).slice(0,8).toUpperCase();
        return cs === s;
    } catch(e) { return false; }
}

function checkAuthStatus() {
    const auth = localStorage.getItem(STORAGE_KEY);
    return auth && validateAuth(getDeviceCode(), auth);
}

function checkAuth() {
    const d = getDeviceCode();
    const a = document.getElementById("authCode").value.trim();
    const tip = document.getElementById("authTip");
    if (!a) { tip.textContent = "请输入授权码！"; return; }

        tip.style.color = "#6cce6c";
        tip.textContent = "✅ 验证成功！";

    }
}

function rangeToNumbers(r) { 
    r = r.trim(); 
    if (!r || r === '-') return [];
    let normalized = r.replace(/[～~－]/g, '-');
    let m = normalized.match(/^(\d+)-(\d+)$/); 
    if (m) { 
        let s = parseInt(m[1]), e = parseInt(m[2]); 
        if (!isNaN(s) && !isNaN(e) && s <= e) { 
            let arr = []; 
            for (let i = s; i <= e; i++) arr.push(i); 
            return arr; 
        } 
    }
    if (r.includes(',')) {
        return r.split(',').map(n => parseInt(n, 10)).filter(n => !isNaN(n));
    }
    let n = parseInt(r); 
    return isNaN(n) ? [] : [n]; 
}

function parseRuleLine(line) { 
    line = line.trim(); 
    if (!line) return null; 
    let arrow = line.match(/(.+?)(?:→|➔|=>|->)(.+)/); 
    if (arrow) { 
        let a = arrow[1].trim(), b = arrow[2].trim(); 
        if (a && b) return { a: a, b: b };
    } 
    let parts = line.split(/\s+/); 
    if (parts.length >= 2) return { a: parts[0], b: parts[1] }; 
    return null; 
}

function getAllRuleSet() { let set = new Set(); for (let i = 1; i <= 5; i++) { let a = document.getElementById(`rule${i}a`).value.trim(); let b = document.getElementById(`rule${i}b`).value.trim(); if (a && b) set.add(`${a}|${b}`); } for (let r of state.customRules) if (r.a && r.b) set.add(`${r.a}|${r.b}`); return set; }

function fillRuleToSlots(aVal, bVal) { 
    let key = `${aVal}|${bVal}`; 
    if (getAllRuleSet().has(key)) return false; 
    for (let i = 1; i <= 5; i++) { 
        let aEl = document.getElementById(`rule${i}a`); 
        let bEl = document.getElementById(`rule${i}b`); 
        if (aEl && bEl && (!aEl.value.trim() || !bEl.value.trim())) { 
            aEl.value = aVal; 
            bEl.value = bVal;
            onRuleChange(); 
            return true; 
        } 
    } 
    state.customRules.push({ a: aVal, b: bVal }); 
    renderCustomRules(); 
    onRuleChange(); 
    return true; 
}

function compareAll() {
    const rules = [
        { a: document.getElementById('rule1a').value.trim(), b: document.getElementById('rule1b').value.trim() },
        { a: document.getElementById('rule2a').value.trim(), b: document.getElementById('rule2b').value.trim() },
        { a: document.getElementById('rule3a').value.trim(), b: document.getElementById('rule3b').value.trim() },
        { a: document.getElementById('rule4a').value.trim(), b: document.getElementById('rule4b').value.trim() },
        { a: document.getElementById('rule5a').value.trim(), b: document.getElementById('rule5b').value.trim() },
    ];
    const allRules = [...rules, ...state.customRules].filter(r => r.a && r.b);
    const rangeText = document.getElementById('rangeData').value.trim();
    const lines = rangeText ? rangeText.split('\n').filter(l => l.trim()) : [];
    
    let allCombosSet = new Set();
    let hitCombosSet = new Set();
    
    for (let line of lines) {
        let arrow = line.match(/(.+?)(?:→|➔|=>|->)(.+)/);
        let aStr = '', bStr = '';
        if (arrow) { aStr = arrow[1].trim(); bStr = arrow[2].trim(); }
        else { let parts = line.split(/\s+/); if (parts.length >= 2) { aStr = parts[0]; bStr = parts[1]; } }
        if (!aStr || !bStr) continue;
        
        let aVals = rangeToNumbers(aStr), bVals = rangeToNumbers(bStr);
        if (aVals.length === 0 || bVals.length === 0) continue;
        
        for (let a of aVals) {
            for (let b of bVals) {
                let comboKey = `${a},${b}`;
                allCombosSet.add(comboKey);
                let matched = false;
                for (let rule of allRules) {
                    if (ruleContains(rule.a, a) && ruleContains(rule.b, b)) {
                        matched = true;
                        break;
                    }
                }
                if (matched) hitCombosSet.add(comboKey);
            }
        }
    }
    
    let totalCombos = allCombosSet.size;
    let hitCombos = hitCombosSet.size;
    let overallRateHtml = totalCombos > 0 ? `<div class="hit-rate-display" style="margin-bottom:8px;">中奖概率：${hitCombos} / ${totalCombos} = ${((hitCombos / totalCombos) * 100).toFixed(2)}%</div>` : `<div class="hit-rate-display" style="margin-bottom:8px;">组合命中率：0 / 0 = 0.00%</div>`;
    
    const c1 = state.countData[1], c2 = state.countData[2];
    if (!c1 || !c2) { document.getElementById('compareResult').innerHTML = overallRateHtml; document.getElementById('compareResult').style.display = 'block'; return; }
    
    const allNumbers = Array.from({ length: 49 }, (_, i) => i + 1);
    const results = [], texts = [];
    allRules.forEach(r => {
        const resSet = new Set();
        for (let n of allNumbers) if (matchRule(c1[n], r.a) && matchRule(c2[n], r.b)) resSet.add(n);
        results.push(Array.from(resSet).sort((a,b)=>a-b));
        texts.push(`${r.a} → ${r.b}`);
    });
    
    const finalSet = new Set();
    results.forEach(res => res.forEach(n => finalSet.add(n)));
    const final = Array.from(finalSet).sort((a,b)=>a-b);
    const totalStat = getTotalZodiacStat();
    let totalHtml = `<div class="total-zodiac-title">📊 生肖冷热门</div><div class="total-zodiac-list">`;
    totalStat.forEach(([z,n]) => { totalHtml += `<span class="zodiac-item" onclick="zodiacUI.showTotalZodiacNum('${z}')">${z} ${n}</span>`; });
    totalHtml += `</div><div class="zodiac-show-num" id="totalZodiacShowNum" style="display:none;margin-top:6px;"></div>`;
    let resHtml = ''; texts.forEach((text,i) => { resHtml += `<div class="group-item compare-row">【${text} · ${results[i].length}】：${utils.formatNumbers(results[i])}</div>`; });
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} 周${['日','一','二','三','四','五','六'][now.getDay()]}`;
    const finalHtml = `<div class="result-title"><span>🔵 统计结果 &nbsp; ${dateStr}</span><label class="switch-control">Memo book<input type="checkbox" id="noteSwitch" onchange="toggleNote()"></label></div><textarea id="noteTextarea" class="note-textarea" placeholder="本澳彩盘口统计系统由蚂蚁数据团队研发，欢迎使用！" oninput="storage.autoSaveNote()"></textarea>${resHtml}${overallRateHtml}<div class="group-item final-row">✅ 特码 ·${final.length}：${utils.formatNumbers(final)}</div><div class="title-right"><button class="copy-btn" data-copy="${utils.formatNumbers(final)}" data-tip="cfTip">Copy</button><span id="cfTip" class="copy-tip"></span></div><div class="query-zodiac-input"><input id="queryZodiacInput" oninput="zodiacUI.queryZodiac()" placeholder="输入数字查生肖"></div><div class="query-zodiac-result" id="queryZodiacResult"></div><div class="total-zodiac-stat">${totalHtml}</div>`;
    document.getElementById('compareResult').innerHTML = finalHtml;
    ui.bindCopyButtons(); storage.loadNote(); keepNoteState();
}

function saveRuleEdit() {
    if (isSaving) return;
    if (!pendingEdit) return;
    isSaving = true;
    const newValue = editInput.value.trim();
    const oldValue = pendingEdit.oldValue;
    try {
        if (newValue && newValue !== oldValue) {
            currentEditingType = pendingEdit.type;
            currentEditingA = pendingEdit.a;
            currentEditingIndex = pendingEdit.index;
            const success = applyUserEditedRule(newValue);
            if (!success) console.warn('规则保存失败');
        } else if (!newValue) {
            showToast('❌ 规则不能为空');
        }
    } catch (err) {
        console.error('saveRuleEdit 异常:', err);
        showToast('❌ 保存时发生错误');
    } finally {
        editPanel.style.display = 'none';
        pendingEdit = null;
        currentEditingType = null;
        currentEditingA = null;
        currentEditingIndex = null;
        isSaving = false;
    }
}

function onEditBlur() { saveRuleEdit(); }
function onEditKeypress(e) { if (e.key === 'Enter') { e.preventDefault(); saveRuleEdit(); } }

function editRule(type, a, value, index) {

    pendingEdit = {
        type: type,
        a: a,
        index: index !== undefined ? index : value,
        oldValue: `${a}→${value}`
    };

function parseRangeDataToRules() {
    const text = document.getElementById('rangeData').value;
    const lines = text.split(/\r?\n/);
    const rules = [];
    for (let line of lines) {
        line = line.trim();
        if (line === "") continue;
        let arrow = line.match(/(.+?)(?:→|➔|=>|->)(.+)/);
        let aStr = '', bStr = '';
        if (arrow) { aStr = arrow[1].trim(); bStr = arrow[2].trim(); }
        else { let parts = line.split(/\s+/); if (parts.length >= 2) { aStr = parts[0]; bStr = parts[1]; } }
        if (!aStr || !bStr) continue;
        let aVals = rangeToNumbers(aStr);
        let bVals = rangeToNumbers(bStr);
        if (aVals.length === 0 || bVals.length === 0) continue;
        for (let a of aVals) {
            for (let b of bVals) {
                rules.push({ a, b });

        }

        let totalGridCount = 0;
        totalGridCount += hot.size;
        for (let [a, set] of warm) totalGridCount += set.size;
        for (let [a, intervals] of cold) for (let inv of intervals) totalGridCount += rangeToNumbers(inv).length;
        document.getElementById('selectRuleGridCount').innerHTML = `精选规则${totalGridCount}格`;
    }
}

function applyUserEditedRule(ruleText) {
    try {
        if (currentEditingType === null || currentEditingA === null) {
            showToast('❌ 编辑状态丢失，请重新点击规则编辑');
            return false;
        }
        const parsed = parseRuleLine(ruleText);
        if (!parsed || parsed.a === undefined || parsed.b === undefined) {
            showToast('❌ 格式错误，请使用格式：A→B 或 A B');
            return false;
        }
        const aStr = parsed.a.trim();
        const newB = parsed.b.trim();
        if (!aStr) { showToast('❌ A 不能为空'); return false; }
        if (!window.selectCurrentData) { showToast('❌ 数据未加载，请刷新页面'); return false; }
        
        function parseAValues(aStr) {
            const values = new Set();
            const parts = aStr.split(',');
            for (let part of parts) {
                part = part.trim();
                if (part.includes('-')) {
                    let [start, end] = part.split('-').map(Number);
                    if (isNaN(start) || isNaN(end)) continue;
                    if (start > end) [start, end] = [end, start];
                    for (let i = start; i <= end; i++) values.add(i);
                } else {
                    let num = parseInt(part, 10);
                    if (!isNaN(num)) values.add(num);
                }
            }
            return Array.from(values).sort((a,b)=>a-b);
        }
        
        const newAValues = parseAValues(aStr);
        if (newAValues.length === 0) {
            showToast('❌ A 格式无效，请使用数字、区间（如7-8）或逗号分隔');
            return false;
        }
        
        const { hot, warm, cold, coldDetails } = window.selectCurrentData;
        const oldAStr = currentEditingA.toString();
        const oldAValues = parseAValues(oldAStr);
        
        if (currentEditingType === 'hot') {
            for (let a of oldAValues) {
                if (hot.has(a)) hot.delete(a);
            }
        } else if (currentEditingType === 'warm') {
            for (let a of oldAValues) {
                let warmSet = warm.get(a);
                if (warmSet && warmSet.has(currentEditingIndex)) {
                    warmSet.delete(currentEditingIndex);
                    if (warmSet.size === 0) warm.delete(a);
                }
            }
        } else if (currentEditingType === 'cold') {
            for (let a of oldAValues) {
                let intervals = cold.get(a);
                if (intervals && currentEditingIndex !== undefined && intervals[currentEditingIndex]) {
                    intervals.splice(currentEditingIndex, 1);
                    if (intervals.length === 0) {
                        cold.delete(a);
                        coldDetails.delete(a);
                    } else {
                        let detail = coldDetails.get(a);
                        if (detail) {
                            detail.rules = intervals;
                            detail.originalB = [];
                        }
                    }
                }
            }
        }
        
        if (currentEditingType === 'hot') {
            for (let a of newAValues) {
                hot.set(a, newB);
            }
        } else if (currentEditingType === 'warm') {
            for (let a of newAValues) {
                if (!warm.has(a)) warm.set(a, new Set());
                warm.get(a).add(newB);
            }
        } else if (currentEditingType === 'cold') {
            const mode = document.getElementById('coldModeSelect').value;
            for (let a of newAValues) {
                let intervals = cold.get(a) || [];
                if (mode === 'minmax') {
                    cold.set(a, [newB]);
                    coldDetails.set(a, { rule: newB, originalB: [], mode: 'minmax' });
                } else {
                    intervals.push(newB);
                    intervals.sort((x, y) => {
                        const getStart = (str) => { const match = str.match(/^\d+/); return match ? parseInt(match[0], 10) : 0; };
                        return getStart(x) - getStart(y);
                    });
                    cold.set(a, intervals);
                    let detail = coldDetails.get(a);
                    if (detail) {
                        detail.rules = intervals;
                        detail.originalB = [];
                    } else {
                        coldDetails.set(a, { rules: intervals, originalB: [], mode: 'diff2' });
                    }
                }
            }
        }
        
        renderSelectRulesFromData();
        updateGridCount();
        showToast('✅ 规则已保存');
        return true;
    } catch (err) {
        console.error('applyUserEditedRule 异常:', err);
        showToast('❌ 保存时发生内部错误');
        return false;
    }
}

function getBStatsFromRules(rules) {
    const stats = new Map();
    for (let { a, b } of rules) {
        if (!stats.has(a)) stats.set(a, new Map());
        const bMap = stats.get(a);
        bMap.set(b, (bMap.get(b) || 0) + 1);
    }
    return stats;
}

function getHotWarmFromStats(stats) {
    const hot = new Map();
    const warm = new Map();
    for (let [a, bMap] of stats) {
        let maxCnt = 0, hotB = null;
        for (let [b, cnt] of bMap) if (cnt > maxCnt) { maxCnt = cnt; hotB = b; }
        if (hotB !== null) hot.set(a, hotB);
        const warmSet = new Set();
        for (let [b, cnt] of bMap) if (cnt >= 2 && b !== hotB) warmSet.add(b);
        if (warmSet.size) warm.set(a, warmSet);
    }
    return { hot, warm };
}

function getColdIntervalsFromStats(stats, hot, warm, mode) {
    const cold = new Map();
    const coldDetails = new Map();
    for (let [a, bMap] of stats) {
        const covered = new Set();
        if (hot.has(a)) covered.add(hot.get(a));
        if (warm.has(a)) for (let b of warm.get(a)) covered.add(b);
        const coldB = [];
        for (let b of bMap.keys()) if (!covered.has(b)) coldB.push(b);
        coldB.sort((x,y)=>x-y);
        if (coldB.length === 0) continue;
        if (mode === 'minmax') {
            const minB = coldB[0], maxB = coldB[coldB.length-1];
            const rule = (minB === maxB) ? `${minB}` : `${minB}-${maxB}`;
            cold.set(a, [rule]);
            coldDetails.set(a, { rule, originalB: coldB, mode: 'minmax' });
        } else {
            const intervals = [];
            let start = coldB[0], prev = start;
            for (let i = 1; i <= coldB.length; i++) {
                const cur = coldB[i];
                if (cur === undefined || cur - prev > 2) {
                    intervals.push(start === prev ? `${start}` : `${start}-${prev}`);
                    start = cur; prev = cur;
                } else { prev = cur; }
            }
            if (intervals.length) { cold.set(a, intervals); coldDetails.set(a, { rules: intervals, originalB: coldB, mode: 'diff2' }); }
        }
    }
    return { cold, coldDetails };
}

function renderSelectRulesWithTooltip(stats, hot, warm, cold, coldDetails, makeClickable = true) {
    function getCountForB(a, bStr) {
        try {
            const bMap = stats.get(a);
            if (!bMap) return '?';
            if (!bStr.includes('-')) {
                let num = parseInt(bStr, 10);
                return bMap.has(num) ? bMap.get(num) : 0;
            }
            let parts = bStr.split('-');
            let start = parseInt(parts[0], 10);
            let end = parseInt(parts[1], 10);
            if (isNaN(start) || isNaN(end) || start > end) return '?';
            let total = 0;
            for (let i = start; i <= end; i++) if (bMap.has(i)) total += bMap.get(i);
            return total;
        } catch(e) { return '?'; }
    }
    const hotList = []; for (let [a,b] of hot.entries()) hotList.push({a,b}); hotList.sort((x,y)=>x.a-y.a);
    const warmList = []; for (let [a,set] of warm) for (let b of [...set].sort()) warmList.push({a,b}); warmList.sort((x,y)=>x.a-y.a||x.b-y.b);
    const coldList = [];
    for (let [a, intervals] of cold.entries()) {
        const detail = coldDetails.get(a);
        const originalB = detail?.originalB || [];
        const mode = detail?.mode || 'minmax';
        for (let idx = 0; idx < intervals.length; idx++) {
            const inv = intervals[idx];
            let title = mode === 'minmax' ? `❄️ 冷区间(minmax) | A=${a} 历史冷B：${originalB.join(',')} → 合并为区间 ${inv}` : `❄️ 冷区间(diff2) | A=${a} 历史冷B：${originalB.join(',')} → 差两位连续合并为 ${inv}`;
            coldList.push({a, inv, title, idx});
        }
    }
    coldList.sort((x,y)=>x.a-y.a);
    let items = [];
    for (let {a,b} of hotList) {
        const cnt = getCountForB(a,b);
        const clickAttr = makeClickable ? ` onclick="editRule('hot', ${a}, '${b}')"` : '';
        items.push(`<span class="ab-line rule-hot" title="🔥 热规则 | A=${a} → ${b} (出现${cnt}次)"${clickAttr}>${a}→${b}</span>`);
    }
    for (let {a,b} of warmList) {
        const cnt = getCountForB(a,b);
        const clickAttr = makeClickable ? ` onclick="editRule('warm', ${a}, '${b}')"` : '';
        items.push(`<span class="ab-line rule-warm" title="🌡️ 温规则 | A=${a} → ${b} (出现${cnt}次)"${clickAttr}>${a}→${b}</span>`);
    }
    for (let {a,inv,title,idx} of coldList) {
        const clickAttr = makeClickable ? ` onclick="editRule('cold', ${a}, '${inv}', ${idx})"` : '';
        items.push(`<span class="ab-line rule-cold" title="${title}"${clickAttr}>${a}→${inv}</span>`);
    }
    return items.join('');
}

        }

    let countMap = {}; for (let i=1;i<=49;i++) countMap[i]=0; numbers.forEach(n=>countMap[n]++); state.countData[num]=countMap; 
    let values = Object.values(countMap).filter(v=>v>0); state.minMax[num].max = values.length ? Math.max(...values) : 0;

    let groupMap = {}; for (let c=0;c<=maxCount;c++) groupMap[c]=[]; for (let i=1;i<=49;i++) { let c = countMap[i]; groupMap[c].push(i); } 
    let sortedCounts = Array.from({length:maxCount+1},(_,i)=>i).filter(c=>groupMap[c].length>0); 
    renderBase(num,numbers.length,new Set(numbers).size,maxCount); 
    renderGroup(num,sortedCounts,groupMap,maxCount); 
}

// ==================== 自动同步轮询逻辑（仅限21:00-21:10） ====================
const DATA_API_URL = 'https://mayipan.eu.cc/gab_summary.html';
let autoSyncInterval = null;
let isAutoSyncing = false;

// 检查当前时间是否在 21:00 - 21:10 之间
function isSyncTimeAllowed() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    // 21:00 到 21:10 之间（包含边界）
    if (hours === 21 && minutes >= 0 && minutes <= 10) return true;
    return false;
}

// 改进解析：提取有效数字行，跳过明显期号行、行内数字过少（<2个数字）的行，取前两行
function extractGAGBFromText(text) {
    const lines = text.split(/\r?\n/);
    const validLines = [];
    for (let line of lines) {
        const trimmed = line.trim();
        if (trimmed === "") continue;
        // 跳过期号行（包含“期”字，或者格式类似“第2026001期”）
        if (/第\s*:?\s*\d{6,7}\s*期/.test(trimmed)) continue;
        // 跳过明显不是数字行的（如包含中文且数字少于2个）
        const numbers = trimmed.match(/\d+/g);
        if (!numbers || numbers.length < 2) continue;
        // 认为这一行是有效数据行
        validLines.push(trimmed);
        if (validLines.length >= 2) break;
    }
    if (validLines.length >= 2) {
        return { ga: validLines[0], gb: validLines[1], period: null };
    }
    return { ga: null, gb: null, period: null };
}

async function performSync() {
    // 非允许时间直接返回，不执行同步
    if (!isSyncTimeAllowed()) {
        console.log('非同步时段，跳过执行');
        return;
    }
    const btn = document.getElementById('autoSyncBtn');
    if (!btn) return;
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const resp = await fetch(DATA_API_URL + '?t=' + Date.now(), { cache: 'no-cache', signal: controller.signal });
        clearTimeout(timeoutId);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        if (!text.trim()) throw new Error('返回数据为空');
        
        const { ga, gb } = extractGAGBFromText(text);
        
        if (!ga || !gb) {
            console.error('解析失败，ga:', ga, 'gb:', gb);
            showToast('数据格式错误，无法解析 GA/GB，请检查远程数据格式');
            return;
        }
        
        const gaNumbers = ga.match(/\d+/g);
        const gbNumbers = gb.match(/\d+/g);
        if (!gaNumbers || gaNumbers.length === 0 || !gbNumbers || gbNumbers.length === 0) {
            showToast('解析出的数字为空，请检查远程数据内容');
            return;
        }
        
        document.getElementById('numInput1').value = ga;
        document.getElementById('numInput2').value = gb;
        autoCalc(1);
        autoCalc(2);
        storage.saveInput();
        showToast('自动同步成功');
    } catch (err) {
        console.error('同步失败:', err);
        showToast(`同步失败: ${err.message}`, true);
    }
}

async function pollAndSync() {
    // 非允许时间不进行轮询同步
    if (!isSyncTimeAllowed()) return;
    try {
        const resp = await fetch(DATA_API_URL + '?t=' + Date.now(), { cache: 'no-cache' });
        if (!resp.ok) return;
        const text = await resp.text();
        const currentData = text.trim();
        const lastData = localStorage.getItem('last_sync_data');
        if (currentData !== lastData) {
            console.log('数据变化，执行完整同步');
            await performSync();
            localStorage.setItem('last_sync_data', currentData);
        } else {
            console.log('数据未变，跳过同步');
        }
    } catch (err) {
        console.error('轮询错误:', err);
    }
}

function toggleAutoSync() {
    // 非允许时间不允许操作，给出明确提示
    if (!isSyncTimeAllowed()) {
        showToast('⚠️ 自动同步仅限 21:00-21:10 操作');
        return;
    }
    const btn = document.getElementById('autoSyncBtn');
    if (isAutoSyncing) {
        // 关闭同步
        if (autoSyncInterval) {
            clearInterval(autoSyncInterval);
            autoSyncInterval = null;
        }
        isAutoSyncing = false;
        btn.innerText = '⚙️ 自动同步关';
        showToast('已关闭自动同步');
    } else {
        // 开启同步：先执行一次同步，然后启动定时器
        isAutoSyncing = true;
        btn.innerText = '⏳ 自动同步开';
        performSync().finally(() => {
            if (autoSyncInterval) clearInterval(autoSyncInterval);
            autoSyncInterval = setInterval(() => {
                if (isAutoSyncing && isSyncTimeAllowed()) {
                    pollAndSync();
                } else if (isAutoSyncing && !isSyncTimeAllowed()) {
                    // 如果时间窗口结束，自动关闭同步
                    toggleAutoSync(); // 调用自身关闭
                }
            }, 5 * 60 * 1000);
            showToast('已开启自动同步（每5分钟检查更新）');
        });
    }
}

// 定时检查时间窗口，若超出时段且同步开启，则自动关闭
function startTimeWindowMonitor() {
    setInterval(() => {
        if (!isSyncTimeAllowed() && isAutoSyncing) {
            // 超出时段且同步开启，自动关闭
            if (autoSyncInterval) {
                clearInterval(autoSyncInterval);
                autoSyncInterval = null;
            }
            isAutoSyncing = false;
            const btn = document.getElementById('autoSyncBtn');
            if (btn) btn.innerText = '⚙️ 自动同步关';
            showToast('⏰ 已超出同步时段（21:00-21:10），自动同步已关闭');
        }
    }, 10000); // 每10秒检查一次
}

// ==================== 默认规则在线采集 ====================
const RANGE_API_URL = 'https://mayipan.eu.cc/default_rules.txt';

async function onlineCollectRange() {
    const btn = document.getElementById('onlineCollectRangeBtn');
    const originalText = btn.innerText;
    btn.innerText = '⏳ 采集中...';
    btn.disabled = true;
    try {
        const url = RANGE_API_URL + '?t=' + Date.now();
        const response = await fetch(url, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const dataText = await response.text();
        if (!dataText || dataText.trim() === '') {
            showToast('采集返回数据为空');
            return;
        }
        document.getElementById('rangeData').value = dataText;
        onRangeDataChange();
        showToast('默认规则在线采集成功');
        storage.saveRange();
    } catch (err) {
        console.error('采集失败:', err);
        showToast('采集失败，请检查网络或数据服务地址');
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

    refreshSelectRange();
    window.editRule = editRule;
};
